# ============================================================================
# SECTION 11: COMMON MISTAKES & RED FLAGS
# ============================================================================

red_flags:

  description: >
    Common misconfigurations and mistakes found during Google Ads audits.
    Each red flag includes detection method and severity.

  critical_red_flags:
    - id: "rf_001"
      name: "No conversion tracking"
      description: "Account running ads with zero conversion actions; optimizing blind"
      detection: "Conversions column shows 0 or '--' across all campaigns for 30+ days"
      impact: "Cannot optimize bids, measure ROI, or use Smart Bidding"
      severity: "critical"
    - id: "rf_002"
      name: "Display Network on Search campaigns"
      description: "Search campaigns opted into Display Network"
      detection: "Networks column includes 'Display Network' on Search campaign type"
      impact: "Diluted intent targeting; typically 80%+ lower conversion rate on Display"
      severity: "critical"
    - id: "rf_003"
      name: "Duplicate conversion counting"
      description: "Same action tracked twice (tag + GA4 import) both included in bidding"
      detection: "Compare conversion action names/sources; look for parallel tracking"
      impact: "Inflated conversion data; Smart Bidding targets wrong CPA"
      severity: "critical"
    - id: "rf_004"
      name: "Broad match with no negatives and no Smart Bidding"
      description: "Maximum exposure to irrelevant queries without safeguards"
      detection: "Match type = Broad AND negative keyword count = 0 AND bid strategy = Manual"
      impact: "50%+ of budget can be wasted on irrelevant searches"
      severity: "critical"

  high_priority_red_flags:
    - id: "rf_005"
      name: "Single RSA per ad group"
      description: "No ad testing possible; missing optimization opportunities"
      detection: "Count enabled ads per ad group < 2"
      impact: "Cannot A/B test messaging; Google recommends at least 1 RSA with diverse assets"
    - id: "rf_006"
      name: "No ad extensions/assets"
      description: "Ads running without any sitelinks, callouts, or other assets"
      detection: "Empty extensions export or no assets at campaign/account level"
      impact: "Lower CTR, smaller ad footprint, lower Ad Rank"
    - id: "rf_007"
      name: "Search Partners running without monitoring"
      description: "Never segmented by network to evaluate Search Partners performance"
      detection: "No network segmentation in reports; Change History shows no network analysis"
      impact: "10-30% of budget potentially wasted on low-quality partner sites"
    - id: "rf_008"
      name: "No audience signals in PMax"
      description: "Performance Max running without any audience signals"
      detection: "PMax campaign settings show empty audience signals"
      impact: "Slower AI learning; less relevant targeting in early phases"
    - id: "rf_009"
      name: "Budget-limited high-performing campaigns"
      description: "Best campaigns restricted by budget while poor campaigns spend freely"
      detection: "Sort by CPA ascending; check Search lost IS (budget) on top performers"
      impact: "Missing conversions at efficient CPA while funding wasteful campaigns"
    - id: "rf_010"
      name: "Missing negative keywords"
      description: "Account with zero or very few negative keywords"
      detection: "Export negative keywords; count < 10 for active account is a red flag"
      impact: "Significant irrelevant spend, especially with Broad or Phrase match"
    - id: "rf_011"
      name: "Location targeting 'Presence or interest' for local business"
      description: "Local business showing ads to people merely interested in the area"
      detection: "Location options = 'Presence or interest' on locally-targeted campaigns"
      impact: "Ads shown to people who will never visit the physical location"
    - id: "rf_012"
      name: "Broken landing page URLs"
      description: "Ads pointing to 404 or 5xx error pages"
      detection: "Crawl Final URL column from ad export; check HTTP status"
      impact: "100% wasted spend on those clicks; damages Quality Score"

  medium_priority_red_flags:
    - id: "rf_013"
      name: "Auto-applied recommendations enabled without review"
      description: "Google automatically applying optimization suggestions (budget increases, new keywords, broad match)"
      detection: "Check Recommendations > Auto-apply settings screenshot"
      impact: "Unwanted budget changes, keyword additions, or match type changes"
      recommendation: "Disable auto-apply for budget, bidding, and keyword recommendations; keep ad suggestions only"
    - id: "rf_014"
      name: "No brand/non-brand campaign separation"
      description: "Brand and generic keywords mixed in same campaigns"
      detection: "Search terms report shows brand terms in generic campaigns"
      impact: "Inflated non-brand performance metrics; inefficient budget allocation"
    - id: "rf_015"
      name: "Stale ad copy (unchanged 6+ months)"
      description: "Ad copy not refreshed in over 6 months"
      detection: "Check Change History for ad creation/edit dates"
      impact: "Ad fatigue; missing seasonal or promotional messaging opportunities"
    - id: "rf_016"
      name: "Not excluding existing customers from acquisition campaigns"
      description: "Paying to acquire customers you already have"
      detection: "Check audience exclusions; verify Customer Match exclusion lists"
      impact: "Wasted acquisition budget on existing customers"
    - id: "rf_017"
      name: "PMax without campaign-level negative keywords"
      description: "PMax capturing irrelevant search queries without negative keyword protection"
      detection: "PMax search terms report shows irrelevant queries; no negatives applied"
      impact: "Budget wasted on irrelevant searches; PMax now supports up to 10,000 negatives"

# ============================================================================
# SECTION 12: GOOGLE ADS + GSC/GA4 CROSS-REFERENCE
# ============================================================================

cross_platform_analysis:

  description: >
    Cross-referencing Google Ads data with Google Search Console and
    Google Analytics 4 provides deeper insights into paid vs organic
    overlap, landing page quality, and full-funnel attribution.

  gads_gsc_cross_reference:
    paid_vs_organic_overlap:
      description: >
        Compare paid keywords in Google Ads with organic queries in GSC
        to find overlap and opportunity gaps.
      method: >
        Export Google Ads keyword report (Keyword, Impressions, Clicks, CTR, CPA).
        Export GSC Performance report (Query, Impressions, Clicks, CTR, Position).
        Match on keyword/query. Analyze:
      analysis_points:
        - name: "Paid + Organic overlap"
          description: "Keywords ranking organically AND being paid for"
          action: >
            IF organic position <= 3 AND paid CPA is high:
              Consider reducing paid bids or pausing paid for these terms.
            IF organic position > 10 AND paid performing well:
              Continue paid; organic not yet visible enough.
        - name: "Organic only gaps"
          description: "Queries driving organic traffic but no paid coverage"
          action: "Evaluate if adding paid coverage would capture more clicks"
        - name: "Paid only gaps"
          description: "Keywords with paid spend but no organic visibility"
          action: "Create content to build organic presence for these terms (long-term savings)"
    landing_page_quality_correlation:
      description: >
        Cross-reference Google Ads landing page experience scores with
        GSC Core Web Vitals data and GA4 engagement metrics.
      method: >
        Export Google Ads Landing Pages report (Landing page, QS components).
        Export GSC Core Web Vitals report (URL, LCP, INP, CLS).
        Export GA4 engagement data (Landing page, Bounce rate, Avg session duration).
        Match on URL/landing page.
      correlation_checks:
        - "Landing pages with 'Below average' LP experience AND poor CWV scores"
        - "Landing pages with high bounce rate in GA4 AND low QS"
        - "Landing pages with good organic CTR but poor paid conversion rate"

  gads_ga4_cross_reference:
    assisted_conversions:
      description: >
        GA4's attribution reports show how Google Ads contributes to
        conversions that are completed via other channels.
      reports:
        - name: "Model comparison report"
          location: "GA4 > Advertising > Attribution > Model comparison"
          description: "Compare DDA vs Last Click to see how Ads assists"
        - name: "Conversion paths"
          location: "GA4 > Advertising > Attribution > Conversion paths"
          description: "See full touchpoint journey including Paid Search role"
      key_metrics:
        - "Assisted conversions (conversions where Paid Search was on the path but not last click)"
        - "Assisted conversion value"
        - "Assisted / Last click ratio (>1 means more assists than direct conversions)"
    landing_page_analysis:
      description: >
        GA4 provides engagement metrics that complement Google Ads landing page data.
      ga4_metrics:
        - "Engagement rate (inverse of bounce rate)"
        - "Average engagement time per session"
        - "Conversions by landing page"
        - "Events (scroll, click, form_submit) by landing page"
      method: >
        Export GA4 landing page report filtered to google/cpc source/medium.
        Compare to Google Ads landing page report.
        Identify pages with high paid traffic but low engagement.

  audit_checks:
    - id: "cross_001"
      name: "Paying for top organic keywords"
      description: "High spend on keywords where organic already ranks position 1-3"
      detection: "Match Google Ads keywords with GSC top queries; filter organic position <= 3"
      severity: "medium"
      recommendation: "Run incrementality test by pausing paid on top organic terms"
    - id: "cross_002"
      name: "Landing page CWV issues affecting QS"
      description: "Paid landing pages failing Core Web Vitals hurting Quality Score"
      detection: "Cross-reference ads LP experience scores with GSC CWV data"
      severity: "high"
    - id: "cross_003"
      name: "High assist ratio not reflected in bidding"
      description: "Google Ads assists many conversions but CPA appears high on last-click"
      detection: "GA4 assisted/last-click ratio > 1.5 for Paid Search"
      severity: "medium"
      recommendation: "Switch to DDA attribution; adjust CPA targets to account for assists"
    - id: "cross_004"
      name: "GA4 and Google Ads conversion discrepancy"
      description: "Significant mismatch between GA4 and Google Ads conversion counts"
      detection: "Compare Google Ads conversions vs GA4 key events for same period"
      threshold: ">15% discrepancy"
      severity: "high"
      common_causes:
        - "Different attribution models"
        - "Different conversion windows"
        - "GA4 import lag (24-48 hours)"
        - "Cross-device tracking differences"
        - "Consent Mode filtering in GA4"

# ============================================================================
# SECTION 13: 2025-2026 PLATFORM CHANGES
# ============================================================================

platform_changes_2025_2026:

  description: >
    Major Google Ads platform changes from 2025 through early 2026 that
    affect audit methodology and recommendations.

  campaign_type_changes:
    - change: "Demand Gen replaces VAC and Discovery"
      date: "2025 (auto-upgrade completed July 2025)"
      details: >
        Video Action Campaigns and Discovery campaigns fully migrated
        to Demand Gen. New features added: Target CPC bidding, new
        customer acquisition goals (New Customer Only Mode),
        AI-generated video tools.
      audit_impact: "Check for legacy VAC/Discovery campaigns; verify Demand Gen migration completed"

    - change: "Power Pack framework"
      date: "May 2025"
      details: >
        Google introduced Power Pack as the recommended campaign
        structure: Search + PMax + Demand Gen working together.
        Replaces the earlier 'Power Pair' (Search + PMax).
      audit_impact: "Evaluate if account is leveraging full Power Pack or missing Demand Gen"

    - change: "AI Max for Search"
      date: "2025"
      details: >
        AI Max is a feature suite that supercharges existing Search
        campaigns with AI capabilities: advanced broad match, keywordless
        targeting (similar to DSA), automatically created assets.
        Not a new campaign type — applied to existing Search campaigns.
      audit_impact: "Check if AI Max is enabled; review auto-created assets for quality"

  pmax_updates:
    - change: "Channel-level reporting"
      date: "Late 2025"
      details: "Performance metrics broken down by Search, Shopping, Display, YouTube, Discover/Gmail at account level"
      audit_impact: "Use channel reporting to evaluate PMax contribution by network"
    - change: "Full search terms reporting"
      date: "2025"
      details: "PMax now shows search terms for Search and Shopping placements"
      audit_impact: "Review PMax search terms for quality; add negatives for irrelevant terms"
    - change: "Campaign-level negative keywords"
      date: "2025"
      details: "PMax supports up to 10,000 campaign-level negative keywords"
      audit_impact: "Check if negatives are applied; essential for brand isolation"
    - change: "Expanded search themes (50 per asset group)"
      date: "2025"
      details: "Limit increased from 25 to 50 search themes per asset group"
    - change: "Retention goals for lapsed customers"
      date: "2025"
      details: "PMax can target lapsed high-value customers for reactivation"
    - change: "High Value Mode"
      date: "2025"
      details: "Increases bids when Google predicts high-LTV customer conversion"
    - change: "Asset-level reporting"
      date: "2025"
      details: "Impressions, clicks, and cost data now available per asset"

  bidding_changes:
    - change: "Enhanced CPC (eCPC) deprecated"
      date: "March 31, 2025"
      details: >
        eCPC removed from Search and Display campaigns. Existing campaigns
        auto-migrated to Manual CPC. Google recommends switching to
        fully automated Smart Bidding.
      audit_impact: "Check for campaigns still showing eCPC; should be on Manual or Smart Bidding now"

  ad_format_changes:
    - change: "Call ads deprecated"
      date: "February 2026 (creation blocked); February 2027 (stop serving)"
      details: "Standalone Call Ads being phased out. Use Call assets on RSAs instead."
      audit_impact: "Check for active Call Ads; migrate to RSAs with call assets"
    - change: "AI-generated assets"
      date: "2025-2026"
      details: >
        Google automatically generates ad headlines, descriptions, images,
        and videos using AI. Auto-generated assets appear in RSAs and PMax.
      audit_impact: "Review auto-generated assets for brand safety and accuracy"
    - change: "Increased asset flexibility for RSAs"
      date: "2025"
      details: >
        Google assembles ad components more dynamically. Moving toward
        asset pool approach rather than fixed ad formats.

  targeting_changes:
    - change: "Audience list minimum reduced to 100"
      date: "2025"
      details: "Minimum audience size for remarketing reduced from 1,000 to 100 across all networks"
      audit_impact: "Smaller businesses can now use remarketing; check for newly eligible lists"
    - change: "Customer Match 540-day cap"
      date: "April 7, 2025"
      details: "Customer Match lists must have members added/updated within 540 days"
      audit_impact: "Check Customer Match list freshness; ensure regular uploads"
    - change: "Lookalike segments becoming suggestions (Demand Gen)"
      date: "March 2026"
      details: "Lookalike segments transitioning from hard targeting to audience suggestions"

  auto_applied_recommendations:
    description: >
      Google can auto-apply optimization recommendations. Audit which
      are enabled, as some can make unwanted changes.
    categories:
      safe_to_auto_apply:
        - "Remove redundant keywords"
        - "Remove conflicting negative keywords"
        - "Update keyword bids to meet first page bid"
      risky_auto_apply:
        - "Upgrade keyword match types to broad" # Can massively expand spend
        - "Raise your budget" # Unauthorized budget increases
        - "Add new keywords" # May add irrelevant keywords
        - "Create new ad assets" # May create off-brand messaging
        - "Switch to Smart Bidding" # Major strategy change
    audit_check:
      id: "change_001"
      name: "Risky auto-applied recommendations enabled"
      detection: "Screenshot Recommendations > Auto-apply settings"
      severity: "high"

  consent_mode_v2:
    description: >
      Required for advertisers in EEA/UK. Consent Mode v2 adds two new
      parameters: ad_user_data and ad_personalization. Without proper
      implementation, remarketing and conversion modeling are impaired.
    parameters:
      - "ad_storage: Controls storage of ad-related cookies"
      - "analytics_storage: Controls storage of analytics cookies"
      - "ad_user_data: Controls sending user data to Google for ads"
      - "ad_personalization: Controls personalized advertising"
    audit_impact: "Verify Consent Mode v2 implementation; check for conversion modeling gaps"

# ============================================================================
# SECTION 14: AUDIT SCORING FRAMEWORK
# ============================================================================

scoring_framework:

  description: >
    Aggregate scoring system for the overall Google Ads audit.
    Each section receives a score of 0-100, weighted by importance.

  section_weights:
    conversion_tracking: 20
    keyword_strategy: 15
    ad_copy_and_assets: 12
    account_structure: 10
    smart_bidding: 12
    shopping_and_pmax: 10
    audience_and_targeting: 8
    budget_and_spend: 8
    quality_score: 5
    total: 100

  severity_scoring:
    critical: "Deduct 15-20 points per finding from section score"
    high: "Deduct 8-12 points per finding from section score"
    medium: "Deduct 3-5 points per finding from section score"
    low: "Deduct 1-2 points per finding from section score"

  overall_rating:
    - range: "90-100"
      label: "Excellent"
      description: "Account is well-optimized with minor tweaks needed"
    - range: "70-89"
      label: "Good"
      description: "Solid foundation with notable improvement areas"
    - range: "50-69"
      label: "Needs Improvement"
      description: "Significant issues affecting performance and ROI"
    - range: "30-49"
      label: "Poor"
      description: "Major structural and strategic problems"
    - range: "0-29"
      label: "Critical"
      description: "Account requires fundamental rebuild"

# ============================================================================
# SECTION 15: ECOMMERCE-SPECIFIC DEEP DIVE
# ============================================================================

ecommerce_specific:

  shopping_vs_pmax:
    description: "Dal 2025, ad rank determina il vincitore quando lo stesso prodotto è in PMax e Standard Shopping (prima PMax vinceva sempre)"
    decision_tree:
      use_standard_shopping: "Controllo granulare search terms, bid manuali, negative keywords precise, gestione stock zombie/stagionale"
      use_pmax: "Massima reach cross-canale (Search, Shopping, YouTube, Display, Discover, Gmail, Maps), audience discovery, gestione semplificata"
      hybrid_recommended: "PMax per scala + Standard Shopping per protezione margini su segmenti specifici, stock stagionale, brand CPCs"

  product_feed_optimization:
    title_formula: "[Brand] + [Product Type] + [Key Attributes (colore, taglia, materiale)] + [Modello]"
    title_rules:
      - "Max 150 caratteri, front-load le keyword più importanti nei primi 70 (troncamento mobile)"
      - "Deve corrispondere al titolo sulla landing page"
      - "No testo promozionale, no ALL CAPS, no keyword stuffing"
    gtin_requirements:
      - "Obbligatorio per tutti i prodotti con GTIN assegnato dal produttore"
      - "Se non esiste GTIN, fornire brand + MPN"
      - "GTIN mancante riduce eligibilità e performance"
    custom_labels_strategy:
      label_0: "Margine profitto (alto/medio/basso)"
      label_1: "Stagionalità (primavera, estate, holiday, evergreen)"
      label_2: "Performance tier (best seller, medio, slow mover)"
      label_3: "Livello stock (alto, basso, clearance)"
      label_4: "Fascia prezzo o stato promozione"

  feed_quality_scoring:
    required_fields:
      - { field: "id", notes: "Unico, max 50 chars" }
      - { field: "title", notes: "Max 150 chars, front-load keywords" }
      - { field: "description", notes: "Max 5000 chars" }
      - { field: "link", notes: "URL landing page" }
      - { field: "image_link", notes: "Min 800x800px, no overlay" }
      - { field: "availability", notes: "in_stock, out_of_stock, preorder" }
      - { field: "price", notes: "DEVE corrispondere alla landing page" }
      - { field: "brand", notes: "Obbligatorio per tutti i prodotti con brand" }
      - { field: "gtin", notes: "Obbligatorio se assegnato dal produttore" }
      - { field: "condition", notes: "new, refurbished, used" }
    impactful_optional_fields:
      - "additional_image_link (fino a 10 immagini aggiuntive)"
      - "product_type (categorizzazione propria, max 750 chars)"
      - "google_product_category (tassonomia Google)"
      - "sale_price + sale_price_effective_date"
      - "color, size, material, pattern, gender, age_group (obbligatori per abbigliamento)"
      - "custom_label_0 through custom_label_4"
      - "cost_of_goods_sold (sblocca reporting profitto)"
      - "product_highlight (bullet points)"
    common_disapprovals:
      - { issue: "Price mismatch (feed vs landing)", fix: "Abilitare Automatic Item Updates, sync feed giornaliero" }
      - { issue: "Availability mismatch", fix: "Sync inventario real-time" }
      - { issue: "Missing GTIN", fix: "Aggiungere GTIN o brand+MPN" }
      - { issue: "Immagine bassa qualità/watermark/overlay", fix: "Min 800x800px, sfondo bianco, no testo" }
      - { issue: "Overlay promozionale su immagine", fix: "Usare attributo sale_price" }
      - { issue: "Attributi obbligatori mancanti (apparel)", fix: "Aggiungere color, size, gender, age_group" }
      - { issue: "Misrepresentation", fix: "Sospensione account — assicurare corrispondenza ad/landing page" }
    freshness:
      google_minimum: "30 giorni (prodotti scadono dopo 30 giorni senza aggiornamento)"
      recommended: "Aggiornamento giornaliero"
      best_practice: "Sync automatico multiplo al giorno per prezzo/disponibilità"

  pmax_ecommerce:
    asset_group_strategy: "Un asset group per categoria prodotto principale"
    asset_requirements:
      headlines: "Min 3, max 20"
      descriptions: "Min 5, max 20"
      images: "Min 1, max 20"
      videos: "Min 1, max 5 (altrimenti Google auto-genera video di bassa qualità)"
      logos: "Max 5"
    search_themes:
      limit: "50 per asset group (aumentato da 25 nel 2025)"
      best_practice: "Termini tematici ampi, NON duplicare exact match keywords"
    url_expansion:
      default: "ON"
      recommendation: "OFF per ecommerce — rischio di mandare traffico a blog/about/category"
      if_on: "Usare Exclude URLs per bloccare pagine non-prodotto"
    brand_exclusions:
      critical: true
      reason: "Senza brand exclusions, PMax gonfia il ROAS rubando conversioni branded"
      setup: "Brand exclusions in PMax settings + campagna Search branded separata"
      expect_after: "Calo ROAS a breve termine in PMax — è chiarezza, non peggioramento"
    cannibalization_detection:
      steps:
        - "Confrontare volume conversioni totali pre/post lancio PMax"
        - "Se totali piatti o in calo = cannibalizzazione"
        - "Se totali crescono = PMax trova traffico incrementale"
        - "Controllare Search Term Insights per overlap PMax↔Search"
        - "Aggiungere search terms PMax performanti come exact match in Search"

  profit_based_bidding:
    description: "Shift da revenue-based a profit-based bidding — trend chiave 2025"
    setup:
      - "Aggiungere cost_of_goods_sold (COGS) al feed Merchant Center"
      - "Google calcola: Gross Profit = Revenue - COGS"
      - "Metriche disponibili: gross profit, gross profit margin, COGS per articoli venduti"
      - "Usare feed rules per calcolare COGS in bulk"
    formula: "Gross Profit = Cart Revenue - Sum(COGS per item sold)"

  new_customer_acquisition:
    modes:
      value_mode: "Aggiunge bonus valore alle conversioni first-purchase (bid più alto per nuovi clienti)"
      only_mode: "Esclude clienti esistenti dal bidding"
      high_ltv_mode: "Agosto 2025: valore incrementale ancora più alto per nuovi clienti predicted high-LTV"
    requirement: "Customer list segmentation via UserListCustomerType"

  conversion_value_rules:
    description: "Adjustment del valore a livello di asta"
    dimensions:
      audience: "es. × 1.5 per membri loyalty program"
      device: "es. × 0.7 per mobile se AOV mobile è inferiore"
      location: "es. + €20 per aree geografiche ad alto margine"
    limits: "Max 2 condizioni per regola"
    requirement: "tROAS o Maximize Conversion Value bidding"

  remarketing_ecommerce:
    dynamic_remarketing_requirements:
      - "Google Ads remarketing tag con custom parameters su tutte le pagine"
      - "Feed Merchant Center collegato a Google Ads"
      - "Custom parameters: ecomm_prodid (matching feed IDs), ecomm_pagetype, ecomm_totalvalue"
    page_type_parameters:
      home: { ecomm_pagetype: "home" }
      category: { ecomm_pagetype: "category", extra: "ecomm_prodid (array)" }
      product: { ecomm_pagetype: "product", extra: "ecomm_prodid, ecomm_totalvalue" }
      cart: { ecomm_pagetype: "cart", extra: "ecomm_prodid (array), ecomm_totalvalue" }
      purchase: { ecomm_pagetype: "purchase", extra: "ecomm_prodid (array), ecomm_totalvalue" }
    rlsa_bid_adjustments:
      cart_abandoners: "+20-50%"
      product_viewers: "+10-30%"
      past_purchasers_acquisition: "-20%"

  seasonal_strategy:
    timeline:
      "8-6 settimane prima": "Costruire audience list, preparare creatività, testare feed"
      "4-6 settimane prima": "Aumentare budget gradualmente, lanciare campagne awareness"
      "2-3 settimane prima": "Budget aggressivo (2-3x spesa giornaliera normale)"
      "Settimana di picco": "Monitorare bid performance più volte al giorno"
      "Post-picco": "Ridurre budget gradualmente, shift a clearance"
    budget_allocation: "60-80% del budget mensile nelle settimane a più alto traffico"
    bid_strategy: "Abbassare target ROAS durante picco: da 400% tipico a 100-150%"
    shopping_during_holidays: "76.4% della spesa ecommerce e 85.3% dei click"

  consent_mode_impact:
    modeled_conversions:
      requirements: "Advanced Consent Mode + min 700 click in 7 giorni per paese/dominio"
      recovery_rate: "15-25% delle conversioni perse recuperate tramite modellazione"
      advanced_mode_preservation: "Fino all'80% dei dati tracking preservati anche senza consent"
    enhanced_conversions_vs_consent_mode:
      consent_mode: "Gestisce utenti che negano consent (modeling cookieless)"
      enhanced_conversions: "Gestisce conversioni con cookie cancellati (hashed first-party data)"
      recommendation: "Implementare ENTRAMBI per massima copertura"

  ecommerce_benchmarks_2025:
    roas_by_category:
      overall_ecommerce: "2.87:1 (in calo)"
      travel_accessories: "4.30 (-21% YoY)"
      consumer_electronics: "3.02 (-11% YoY)"
      beauty_personal_care: "~3.50"
      pets_animals: "2.84 (+3% YoY — unico in crescita)"
      health_wellness: "2.12 (-16% YoY)"
      apparel_fashion: "~3.0+ (CTR up, CPA rising)"
    thresholds:
      strong_roas: "4:1"
      excellent_roas: "5:1+"
    shopping_stats:
      cpc_vs_search: "43% CPC inferiore a Search"
      cpa_vs_search: "14% CPA migliore di Search"
      impression_share_target_brand: "90%+"
      impression_share_typical_nonbrand: "30-60%"

  competitor_analysis:
    auction_insights_metrics:
      search: ["Impression Share", "Overlap Rate", "Outranking Share", "Position Above Rate", "Top of Page Rate", "Absolute Top of Page Rate"]
      shopping: ["Impression Share", "Overlap Rate", "Outranking Share"]
    interpretation:
      competitor_is_rising: "Stanno aumentando budget/bid — valutare se rispondere"
      high_overlap_gt_60: "Competitor diretto sugli stessi termini — differenziare ad copy"
      low_outranking: "Competitor domina — migliorare QS, alzare bid, o controllare feed"
    double_serving_caveat: >
      Da aprile 2025, Google permette double-serving: un competitor può
      apparire sia in alto che in basso, gonfiando impression share.
      Monitorare trend nel tempo, non snapshot singoli.

# ============================================================================
# SECTION 16: PRE-AUDIT QUESTIONS
# ============================================================================

pre_audit_questions:

  - id: "Q-GA01"
    question: "Hai accesso a Google Ads (anche solo lettura)?"
    options: ["Sì, accesso completo", "Sì, solo lettura", "Solo export/screenshot", "Nessun accesso"]
    purpose: "Determina il livello di audit possibile"
    critical: true

  - id: "Q-GA02"
    question: "Quali tipi di campagne hai attivi?"
    options: ["Search", "Shopping", "Performance Max", "Display", "Video/YouTube", "Demand Gen"]
    multi_select: true
    purpose: "Determina quali sezioni dell'audit applicare"

  - id: "Q-GA03"
    question: "Il conversion tracking è configurato?"
    options: ["Sì, tramite tag Google", "Sì, tramite GA4 imported goals", "Non so", "No"]
    purpose: "Check più critico dell'audit — senza tracking, tutto il resto è inutile"
    critical: true

  - id: "Q-GA04"
    question: "Hai Enhanced Conversions attive?"
    options: ["Sì", "No", "Non so"]
    purpose: "Enhanced Conversions recuperano 5-15% conversioni perse"

  - id: "Q-GA05"
    question: "Budget mensile approssimativo?"
    options: ["< €1.000", "€1.000-5.000", "€5.000-20.000", "> €20.000"]
    purpose: "Scala le raccomandazioni al budget — sotto €1K alcune strategie non sono praticabili"

  - id: "Q-GA06"
    question: "Obiettivo principale delle campagne?"
    options: ["Vendite ecommerce (ROAS)", "Lead generation (CPA)", "Brand awareness", "App installs"]
    purpose: "Determina KPI e benchmark appropriati"
    critical: true

  - id: "Q-GA07"
    question: "Hai un feed Merchant Center collegato?"
    options: ["Sì", "No", "Non so"]
    purpose: "Necessario per Shopping e PMax — senza feed, queste campagne non funzionano"
    conditional: "Solo se ecommerce"

  - id: "Q-GA08"
    question: "Stai usando Smart Bidding o bidding manuale?"
    options: ["Smart Bidding (tROAS/tCPA)", "Maximize Conversions/Value", "Manual CPC", "Mix", "Non so"]
    purpose: "Determina la complessità dell'audit bidding"

  - id: "Q-GA09"
    question: "Hai notato problemi specifici o cali di performance?"
    options: ["Sì, ROAS in calo", "Sì, CPA troppo alto", "Sì, impressioni in calo", "Performance stabile", "In crescita"]
    purpose: "Orientare l'audit verso diagnosi problema o ottimizzazione"

  - id: "Q-GA10"
    question: "Consent Mode v2 è implementato?"
    options: ["Sì, Advanced", "Sì, Basic", "No", "Non so"]
    purpose: "Impatta attribuzione conversioni per traffico EEA"

# ============================================================================
# ENRICHMENT: claude-ads 74 AUDIT CHECKS (Source: AgriciDaniel/claude-ads)
# ============================================================================
# Added: 2026-02-27
# Source: claude-ads/skills/ads-google/ + ads/references/
# Each check has: id, name, severity, category, pass/warning/fail criteria

audit_checks:

  # --------------------------------------------------------------------------
  # CONVERSION TRACKING (25% weight, 11 checks)
  # --------------------------------------------------------------------------
  conversion_tracking_checks:
    weight: 0.25
    description: "Fondazione di tutta l'ottimizzazione — senza tracking corretto, Smart Bidding non funziona"

    checks:
      - id: "G42"
        name: "Conversion actions defined"
        severity: "critical"
        pass: "≥1 primary conversion action configurata"
        fail: "Nessuna conversion action attiva"
        fix: "Configurare almeno una conversione primaria (Purchase o Lead)"
        fix_time: "10 min"

      - id: "G43"
        name: "Enhanced Conversions attive"
        severity: "critical"
        pass: "Enhanced Conversions attive per conversioni primarie"
        warning: "Abilitate ma non verificate"
        fail: "Non abilitate"
        fix: "Abilitare in Google Ads > Conversions > Settings"
        fix_time: "5 min"
        quick_win: true
        impact: "Recupera ~10% conversioni perse in ambienti senza cookie"

      - id: "G-CT1"
        name: "No conteggio duplicato"
        severity: "critical"
        pass: "GA4 + Google Ads non contano la stessa conversione due volte"
        fail: "Sia GA4 import che tag nativo contano la stessa azione"
        fix: "Usare solo uno dei due metodi per ogni azione di conversione"

      - id: "G-CT3"
        name: "Google Tag firing"
        severity: "critical"
        pass: "gtag.js o GTM funzionante su tutte le pagine"
        warning: "Attivo sulla maggior parte delle pagine (>90%)"
        fail: "Tag mancante o rotto su pagine chiave"

      - id: "G45"
        name: "Consent Mode v2 (EU/EEA)"
        severity: "critical"
        pass: "Consent Mode v2 implementato con modalità Advanced"
        warning: "Solo modalità Basic"
        fail: "Non implementato (se serve EU/EEA)"
        impact: "Senza: 90-95% calo metriche. Advanced recupera 30-50% conversioni perse"
        note: "OBBLIGATORIO EU/EEA da Marzo 2024, enforcement July 2025"

      - id: "G44"
        name: "Server-side tracking"
        severity: "high"
        pass: "Server-side GTM o Google Ads API conversion import attivo"
        warning: "Pianificato ma non deployato"
        fail: "Nessun tracking server-side"

      - id: "G47"
        name: "Separazione micro vs macro"
        severity: "high"
        pass: "Solo macro conversioni (Purchase, Lead) impostate come 'Primary' per bidding"
        warning: "Alcune micro-conversioni come Primary"
        fail: "Tutti gli eventi incluso micro (AddToCart, TimeOnSite) come Primary"
        fix: "Spostare micro-conversioni su Secondary in Conversions settings"

      - id: "G49"
        name: "Assegnazione valori conversione"
        severity: "high"
        pass: "Valori dinamici per ecom; value rules per lead gen"
        warning: "Valori statici assegnati"
        fail: "Nessun valore conversione"

      - id: "G-CT2"
        name: "GA4 collegato e funzionante"
        severity: "high"
        pass: "GA4 property collegata, dati fluiscono correttamente"
        warning: "Collegata ma discrepanze nei dati"
        fail: "Non collegata"

      - id: "G46"
        name: "Finestra conversione appropriata"
        severity: "medium"
        pass: "Finestra coerente con ciclo vendita (7d ecom, 30-90d B2B, 30d lead gen)"
        warning: "Default 30d senza validazione"
        fail: "Finestra non adatta al ciclo vendita"

      - id: "G48"
        name: "Modello di attribuzione"
        severity: "medium"
        pass: "Data-driven attribution (DDA) selezionata"
        warning: "Last Click (intenzionale)"
        fail: "Modello rule-based ancora attivo (deprecato Sep 2025)"
        note: "DDA è ora OBBLIGATORIO default. Solo DDA e Last Click rimasti."

  # --------------------------------------------------------------------------
  # WASTED SPEND / NEGATIVES (20% weight, 8 checks)
  # --------------------------------------------------------------------------
  wasted_spend_checks:
    weight: 0.20
    description: "Perdite di budget dirette — termini irrilevanti, negative mancanti"

    checks:
      - id: "G13"
        name: "Audit search terms recente"
        severity: "critical"
        pass: "Search terms revisionati negli ultimi 14 giorni"
        warning: "Revisionati entro 30 giorni"
        fail: "Non revisionati da >30 giorni"

      - id: "G14"
        name: "Negative keyword lists esistono"
        severity: "critical"
        pass: "≥3 liste tematiche (Competitor, Jobs, Free, Irrelevant)"
        warning: "1-2 liste esistono"
        fail: "Nessuna lista di negative keywords"
        quick_win: true
        fix_time: "10 min"

      - id: "G16"
        name: "Wasted spend su termini irrilevanti"
        severity: "critical"
        pass: "<5% del budget su search terms irrilevanti (ultimi 30d)"
        warning: "5-15% su termini irrilevanti"
        fail: ">15% su termini irrilevanti"

      - id: "G17"
        name: "Broad Match + Smart Bidding pairing"
        severity: "critical"
        pass: "Nessuna keyword Broad Match con Manual CPC"
        fail: "Broad Match + Manual CPC attivo"
        fix: "Passare a Smart Bidding o Exact Match"
        quick_win: true
        fix_time: "5 min"

      - id: "G15"
        name: "Account-level negatives applicate"
        severity: "high"
        pass: "Liste negative applicate a livello account o tutte le campagne"
        warning: "Applicate solo ad alcune campagne"
        fail: "Non applicate"

      - id: "G18"
        name: "Close variant pollution"
        severity: "high"
        pass: "Exact/Phrase match non triggera varianti irrilevanti"
        warning: "Problemi minori con close variants"
        fail: "Spesa significativa su close variants irrilevanti"

      - id: "G-WS1"
        name: "Zero-conversion keywords"
        severity: "high"
        pass: "Nessuna keyword con >100 click e 0 conversioni"
        warning: "1-3 keywords con >100 click e 0 conversioni"
        fail: ">3 keywords con >100 click e 0 conversioni"

      - id: "G19"
        name: "Search term visibility"
        severity: "medium"
        pass: ">60% della spesa search terms visibile (non nascosta)"
        warning: "40-60% visibile"
        fail: "<40% visibile"

  # --------------------------------------------------------------------------
  # ACCOUNT STRUCTURE (15% weight, 12 checks)
  # --------------------------------------------------------------------------
  account_structure_checks:
    weight: 0.15
    description: "Organizzazione campagne, naming, separazione brand/non-brand"

    checks:
      - id: "G05"
        name: "Separazione Brand vs Non-Brand"
        severity: "critical"
        pass: "Brand e non-brand in campagne separate"
        fail: "Brand e non-brand nella stessa campagna"
        quick_win: true
        fix_time: "10 min"

      - id: "G03"
        name: "Ad group a tema singolo"
        severity: "high"
        pass: "Ogni ad group target 1 tema keyword (≤10 keywords)"
        warning: "11-20 keywords con tema coerente"
        fail: "Ad groups con 20+ keywords non correlate"

      - id: "G04"
        name: "Campagne per obiettivo"
        severity: "high"
        pass: "≤5 campagne per stadio funnel/obiettivo"
        warning: "6-8 campagne per obiettivo"
        fail: ">8 campagne per obiettivo (frammentato)"

      - id: "G07"
        name: "Overlap Search + PMax"
        severity: "high"
        pass: "Esclusioni brand configurate in PMax quando esiste campagna Search brand"
        warning: "Esclusioni brand parziali"
        fail: "Nessuna esclusione brand in PMax con campagna brand Search attiva"

      - id: "G08"
        name: "Budget allocation matches priority"
        severity: "high"
        pass: "Campagne top-performing non limitate dal budget"
        warning: "Limiti di budget minori sui top performers"
        fail: "Top performers severamente limitati dal budget"

      - id: "G11"
        name: "Geographic targeting accuracy"
        severity: "high"
        pass: "'People in' (non 'People in or interested in') per local"
        fail: "'People in or interested in' per business locale"
        quick_win: true
        fix_time: "2 min"

      - id: "G12"
        name: "Network settings"
        severity: "high"
        pass: "Search Partners e Display Network disabilitati per Search (salvo scelta)"
        warning: "Search Partners ON (monitorato)"
        fail: "Display Network ON per campagna Search"
        quick_win: true
        fix_time: "2 min"

      - id: "G01"
        name: "Campaign naming convention"
        severity: "medium"
        pass: "Pattern consistente (es. [Brand]_[Type]_[Geo]_[Target])"
        warning: "Parzialmente consistente"
        fail: "Nessuna naming convention"

      - id: "G02"
        name: "Ad group naming convention"
        severity: "medium"
        pass: "Corrisponde al pattern naming campagna"
        warning: "Parzialmente consistente"
        fail: "Nessuna naming convention"

      - id: "G06"
        name: "PMax presente per account idonei"
        severity: "medium"
        pass: "PMax attivo per account con storico conversioni"
        warning: "PMax testato ma in pausa"
        fail: "PMax mai testato nonostante idoneità"

      - id: "G09"
        name: "Budget giornaliero vs spesa"
        severity: "medium"
        pass: "Nessuna campagna raggiunge il cap budget prima delle 18:00"
        warning: "1-2 campagne raggiungono il cap presto"
        fail: "Più campagne cappate prima di mezzogiorno"

      - id: "G10"
        name: "Ad schedule configurato"
        severity: "medium"
        pass: "Schedule impostato se il business ha orari operativi"
        fail: "Nessuno schedule nonostante orari business chiari"

  # --------------------------------------------------------------------------
  # KEYWORDS & QUALITY SCORE (15% weight, 8 checks)
  # --------------------------------------------------------------------------
  keywords_quality_score_checks:
    weight: 0.15
    description: "Quality Score impatta direttamente CPC e ad rank"

    checks:
      - id: "G21"
        name: "Keywords con QS critico"
        severity: "critical"
        pass: "<10% keywords con QS ≤3"
        warning: "10-25% con QS ≤3"
        fail: ">25% con QS ≤4"

      - id: "G20"
        name: "Quality Score medio"
        severity: "high"
        pass: "QS medio pesato per impressioni ≥7"
        warning: "QS 5-6"
        fail: "QS ≤4"
        benchmark: "QS alto = sconto CPC 50%; QS basso = penalità CPC 400%"

      - id: "G22"
        name: "Expected CTR component"
        severity: "high"
        pass: "<20% keywords con 'Below Average' expected CTR"
        warning: "20-35% Below Average"
        fail: ">35% Below Average"

      - id: "G23"
        name: "Ad relevance component"
        severity: "high"
        pass: "<20% keywords con 'Below Average' ad relevance"
        warning: "20-35% Below Average"
        fail: ">35% Below Average"

      - id: "G24"
        name: "Landing page experience"
        severity: "high"
        pass: "<15% keywords con 'Below Average' landing page exp."
        warning: "15-30% Below Average"
        fail: ">30% Below Average"

      - id: "G-KW2"
        name: "Keyword-to-ad relevance"
        severity: "high"
        pass: "Headlines contengono varianti keyword primarie"
        warning: "Inclusione keyword parziale"
        fail: "Nessuna variante keyword nelle headline"

      - id: "G25"
        name: "Top keyword QS"
        severity: "medium"
        pass: "Top 20 keywords per spesa hanno tutte QS ≥7"
        warning: "Alcune top keywords a QS 5-6"
        fail: "Top keywords con QS ≤4"

      - id: "G-KW1"
        name: "Zero-impression keywords"
        severity: "medium"
        pass: "Nessuna keyword con 0 impressioni negli ultimi 30 giorni"
        warning: "<10% zero-impression"
        fail: ">10% keywords con 0 impressioni"

  # --------------------------------------------------------------------------
  # ADS & ASSETS (15% weight, 17 checks)
  # --------------------------------------------------------------------------
  ads_assets_checks:
    weight: 0.15
    description: "RSA strength, PMax asset completeness, extensions"

    checks:
      - id: "G31"
        name: "PMax asset group density"
        severity: "critical"
        pass: "≥20 immagini, ≥5 loghi, ≥5 video per gruppo"
        warning: "5-19 immagini, 1-4 loghi, o 1-4 video"
        fail: "<5 immagini O 0 loghi O 0 video"

      - id: "G26"
        name: "RSA per ad group"
        severity: "high"
        pass: "≥1 RSA per ad group (≥2 consigliato)"
        warning: "1 RSA per ad group"
        fail: "Ad groups senza RSA"

      - id: "G27"
        name: "RSA headline count"
        severity: "high"
        pass: "≥8 headline uniche per RSA (ideale: 12-15)"
        warning: "3-7 headlines"
        fail: "<3 headlines"

      - id: "G29"
        name: "RSA Ad Strength"
        severity: "high"
        pass: "Tutti i RSA 'Good' o 'Excellent'"
        warning: "Alcuni 'Average'"
        fail: "Qualsiasi RSA con 'Poor' Ad Strength"

      - id: "G32"
        name: "PMax video assets presenti"
        severity: "high"
        pass: "Video nativi in tutti i formati (16:9, 1:1, 9:16)"
        warning: "Solo 1-2 formati"
        fail: "Nessun video nativo (solo auto-generato)"

      - id: "G34"
        name: "PMax final URL expansion"
        severity: "high"
        pass: "Configurato intenzionalmente (ON per discovery, OFF per controllo)"
        fail: "Default ON senza revisione"

      - id: "G35"
        name: "Ad copy relevance to keywords"
        severity: "high"
        pass: "Headlines contengono varianti keyword primarie"
        warning: "Inclusione keyword parziale"
        fail: "Nessuna rilevanza keyword nelle headlines"

      - id: "G-AD2"
        name: "CTR vs industry benchmark"
        severity: "high"
        pass: "CTR ≥ media industria"
        warning: "CTR 50-100% della media industria"
        fail: "CTR <50% della media industria"

      - id: "G-PM1"
        name: "Audience signals configurati"
        severity: "high"
        pass: "Custom audience signals per asset group"
        warning: "Solo segnali generici"
        fail: "Nessun audience signal"

      - id: "G-PM2"
        name: "PMax Ad Strength"
        severity: "high"
        pass: "'Good' o 'Excellent'"
        warning: "'Average'"
        fail: "'Poor'"

      - id: "G-PM3"
        name: "Brand cannibalization"
        severity: "high"
        pass: "<15% conversioni PMax da termini brand"
        warning: "15-30% da termini brand"
        fail: ">30% da termini brand"

      - id: "G-PM5"
        name: "Negative keywords in PMax"
        severity: "high"
        pass: "Brand + negative irrilevanti applicati (fino a 10.000)"
        warning: "Alcune negative applicate"
        fail: "Nessuna negative keyword in PMax"

      - id: "G28"
        name: "RSA description count"
        severity: "medium"
        pass: "≥3 descrizioni per RSA (ideale: 4)"
        warning: "2 descrizioni"
        fail: "<2 descrizioni"

      - id: "G30"
        name: "RSA pinning strategy"
        severity: "medium"
        pass: "Pinning strategico (1-2 posizioni, 2-3 varianti ciascuna)"
        warning: "Over-pinned (tutte le posizioni)"
        fail: "—"

      - id: "G33"
        name: "PMax asset group count"
        severity: "medium"
        pass: "≥2 asset groups per PMax (segmentati per intento)"
        warning: "1 asset group"

      - id: "G-AD1"
        name: "Ad freshness"
        severity: "medium"
        pass: "Nuovo ad copy testato negli ultimi 90 giorni"
        fail: "Nessun nuovo ad in >90 giorni"

      - id: "G-PM4"
        name: "Search themes"
        severity: "medium"
        pass: "Search themes configurati (fino a 50 per asset group)"
        warning: "<5 search themes"
        fail: "Nessun search theme"

  # --------------------------------------------------------------------------
  # SETTINGS & TARGETING (10% weight, 18 checks)
  # --------------------------------------------------------------------------
  settings_targeting_checks:
    weight: 0.10
    description: "Bidding, estensioni, audiences, landing pages"

    checks:
      - id: "G36"
        name: "Smart bidding strategy attiva"
        severity: "high"
        pass: "Tutte le campagne con ≥15 conv/30d usano automated bidding"
        warning: "Parzialmente automatizzato"
        fail: "Manual CPC su campagne con dati sufficienti"

      - id: "G37"
        name: "Target CPA/ROAS ragionevole"
        severity: "high"
        pass: "Target entro 20% della performance storica"
        warning: "Target 20-50% diverso dallo storico"
        fail: "Target CPA <50% del CPA effettivo"

      - id: "G38"
        name: "Learning phase status"
        severity: "high"
        pass: "<25% campagne in 'Learning' o 'Learning Limited'"
        warning: "25-40% in learning"
        fail: ">40% in learning"

      - id: "G39"
        name: "Budget constrained campaigns"
        severity: "high"
        pass: "Top performers mostrano 'Eligible' non 'Limited by Budget'"
        warning: "Limitazione budget minore"
        fail: "Top performers severamente limitati dal budget"

      - id: "G50"
        name: "Sitelink extensions"
        severity: "high"
        pass: "≥4 sitelinks per campagna"
        warning: "1-3 sitelinks"
        fail: "Nessun sitelink"
        quick_win: true
        fix_time: "10 min"

      - id: "G56"
        name: "Audience segments applicati"
        severity: "high"
        pass: "Remarketing + in-market audiences in modalità Observation"
        warning: "Alcune audiences applicate"
        fail: "Nessun audience signal"

      - id: "G57"
        name: "Customer Match lists"
        severity: "high"
        pass: "Lista Customer Match caricata, aggiornata <30 giorni"
        warning: "Lista >30 giorni"
        fail: "Nessuna Customer Match list"
        note: "Richiede 90d storico + $50K lifetime spend per accesso completo. Max membership 540d (dal 7 Apr 2025)"

      - id: "G58"
        name: "Placement exclusions"
        severity: "high"
        pass: "Esclusioni placement a livello account (giochi, app, siti MFA)"
        warning: "Solo a livello campagna"
        fail: "Nessuna esclusione placement"

      - id: "G59"
        name: "Landing page mobile speed"
        severity: "high"
        pass: "Mobile LCP <2.5s (ideale <2.0s)"
        warning: "LCP 2.5-4.0s"
        fail: "LCP >4.0s"

      - id: "G60"
        name: "Landing page relevance"
        severity: "high"
        pass: "Landing page H1/title corrisponde al tema dell'ad group"
        warning: "Rilevanza parziale"
        fail: "Nessuna rilevanza con l'ad group"

      - id: "G40"
        name: "Manual CPC justification"
        severity: "medium"
        pass: "Manual CPC solo su campagne con <15 conv/mese"
        warning: "Manual CPC con 15-30 conv/mese"
        fail: "Manual CPC con >30 conv/mese"

      - id: "G41"
        name: "Portfolio bid strategies"
        severity: "medium"
        pass: "Campagne a basso volume raggruppate in portfoli"
        fail: "Più campagne <15 conv che girano indipendentemente"

      - id: "G51"
        name: "Callout extensions"
        severity: "medium"
        pass: "≥4 callouts per campagna"
        warning: "1-3 callouts"
        fail: "Nessun callout"

      - id: "G52"
        name: "Structured snippets"
        severity: "medium"
        pass: "≥1 set structured snippet"
        fail: "Nessuno structured snippet"

      - id: "G53"
        name: "Image extensions"
        severity: "medium"
        pass: "Image extensions attive per campagne Search"
        fail: "Nessuna image extension"

      - id: "G54"
        name: "Call extensions (se applicabile)"
        severity: "medium"
        pass: "Call extensions con call tracking per business telefonici"
        warning: "Call extension senza tracking"
        fail: "Nessuna call extension per business telefonico"

      - id: "G55"
        name: "Lead form extensions"
        severity: "medium"
        pass: "Lead form testato per account lead gen"
        fail: "Non testato"

      - id: "G61"
        name: "Landing page schema markup"
        severity: "medium"
        pass: "Schema Product/FAQ/Service presente"
        fail: "Nessun schema markup"

  # --------------------------------------------------------------------------
  # QUALITY GATES (cross-check rules)
  # --------------------------------------------------------------------------
  quality_gates:
    description: "Regole automatiche per identificare problemi critici immediati"

    rules:
      - id: "QG-01"
        name: "3x Kill Rule"
        description: "Qualsiasi campagna/ad group con CPA >3x target → segnalare per pausa"
        severity: "critical"
        action: "Pausa immediata"

      - id: "QG-02"
        name: "Budget sufficiency"
        description: "Budget giornaliero deve essere sufficiente per learning phase"
        thresholds:
          google_search: "$20/giorno minimo"
          google_pmax: "$50/giorno minimo"
        severity: "high"

      - id: "QG-03"
        name: "Broad Match rule"
        description: "Broad Match SOLO con Smart Bidding — MAI con Manual CPC"
        severity: "critical"

      - id: "QG-04"
        name: "Learning phase protection"
        description: "Non modificare campagne durante learning phase (nessun cambio budget >20%, targeting o bidding)"
        severity: "high"

      - id: "QG-05"
        name: "Zero conversions spend"
        description: "Campagna con spesa ≥$100 o ≥50 click senza conversioni → segnalare per pausa"
        severity: "critical"

  # --------------------------------------------------------------------------
  # BIDDING STRATEGY DECISION ENGINE
  # --------------------------------------------------------------------------
  bidding_decision_engine:
    description: "Albero decisionale per strategia di bidding basato su volume conversioni"

    tiers:
      - conversions_per_month: "<15"
        strategy: "Maximize Clicks"
        max_cpc_formula: "Target_CPA / (CVR × 1.5)"
        learning_period: "3-5 giorni"
        next_step: "Quando raggiunge 15+ conversioni → passare a Maximize Conversions"

      - conversions_per_month: "15-29"
        strategy: "Maximize Conversions (uncapped)"
        learning_period: "7-14 giorni"
        next_step: "Quando CPA SD < 20% su 14d → passare a Target CPA"

      - conversions_per_month: "30+"
        strategy: "Target CPA"
        requires: "30+ conversioni (Google dice 15, ma 30+ per performance affidabile, 50+ ideale)"
        set_at: "1.1x-1.2x CPA storico"
        adjustment: "Max 10% cambio ogni 14 giorni. Mai abbassare >15% in una volta"

      - conversions_per_month: "50+"
        strategy: "Target ROAS"
        requires: "Valori di conversione dinamici + 50+ conversioni"
        set_at: "ROAS storico esatto"
        formula: "Bid = P(conv) × Value × 1/tROAS"

      - campaign_type: "Brand Protection"
        strategy: "Target Impression Share"
        target: "95-100% su keyword brand"
        note: "Non richiede dati conversione"

