# ============================================================================
# GOOGLE ADS AUDIT CHECKLIST — KNOWLEDGE BASE
# ============================================================================
# Version: 1.0
# Date: 2026-02-26
# Purpose: Comprehensive checklist for MarTech audit of Google Ads accounts
#          using EXPORTED data (CSV/reports) and manual screenshots — NOT
#          live API access. Covers account structure, conversion tracking,
#          keywords, ad copy, bidding, Shopping/PMax, audiences, budgets,
#          Quality Score, benchmarks, red flags, cross-platform, and 2025-2026
#          platform changes.
# Vertical: All (with ecommerce-specific sections)
# ============================================================================

metadata:
  version: "1.0"
  vertical: "all"
  last_updated: "2026-02-26"
  description: >
    Structured knowledge base for auditing a Google Ads account using exported
    CSV reports, Editor exports, and UI screenshots. Each section includes
    report field names, thresholds, formulas, decision trees, and actionable
    audit checks with severity ratings.
  data_sources:
    - "Google Ads UI CSV exports (Campaigns, Ad groups, Keywords, Ads, Extensions, Search terms)"
    - "Google Ads Editor bulk exports (.csv)"
    - "Google Merchant Center product feed exports"
    - "Google Analytics 4 exported reports or Looker Studio dashboards"
    - "Google Search Console performance exports"
    - "Manual screenshots of settings, recommendations, auction insights"
  export_instructions: >
    In Google Ads UI: Reports > Predefined reports (or custom) > Download CSV.
    In Google Ads Editor: Account > Export whole account or selected campaigns.
    Key CSV files needed: Campaign report, Ad Group report, Keyword report,
    Search Terms report, Ad report, Extensions report, Auction Insights,
    Change History, Landing Pages report, Conversion actions export.

# ============================================================================
# SECTION 1: ACCOUNT STRUCTURE AUDIT
# ============================================================================

account_structure:

  description: >
    Evaluates the organizational hierarchy of the Google Ads account:
    campaigns, ad groups, naming conventions, and campaign-level settings.
    A well-structured account improves Quality Score, budget control,
    and reporting clarity.

  campaign_types:
    - type: "Search"
      network: "Google Search Network"
      description: "Text ads triggered by keyword searches"
      status: "active"
      notes: "Core campaign type for intent-based advertising"
    - type: "Shopping"
      network: "Google Shopping / Search"
      description: "Product listing ads from Merchant Center feed"
      status: "active"
      notes: "Requires linked Merchant Center; uses product data not keywords"
    - type: "Performance Max (PMax)"
      network: "All Google networks (Search, Shopping, Display, YouTube, Discover, Gmail, Maps)"
      description: "AI-driven cross-channel campaign using asset groups"
      status: "active"
      notes: "Replaced Smart Shopping and Local campaigns; uses audience signals, search themes"
    - type: "Display"
      network: "Google Display Network (GDN)"
      description: "Visual banner/responsive ads on partner websites"
      status: "active"
      notes: "Best for awareness and remarketing; typically lower intent"
    - type: "Video"
      network: "YouTube and Google video partners"
      description: "Video ads (skippable, non-skippable, bumper, in-feed)"
      status: "active"
      notes: "Includes YouTube Shorts inventory"
    - type: "Demand Gen"
      network: "YouTube, Discover, Gmail"
      description: "Visually immersive ads for mid-funnel demand creation"
      status: "active"
      notes: "Replaced Video Action Campaigns (VAC) and Discovery campaigns in 2025"
    - type: "App"
      network: "Search, Play, YouTube, Display"
      description: "Automated app install and engagement campaigns"
      status: "active"
      notes: "Uses app store listing assets; fully automated targeting"
    - type: "Discovery"
      network: "Discover, YouTube, Gmail"
      description: "Visual ads in Google feeds"
      status: "deprecated"
      notes: "Replaced by Demand Gen campaigns; auto-upgraded mid-2025"
    - type: "Video Action Campaign (VAC)"
      network: "YouTube"
      description: "Video ads optimized for conversions"
      status: "deprecated"
      notes: "Auto-upgraded to Demand Gen starting March 2025, completed July 2025"
    - type: "Smart Shopping"
      network: "Shopping, Display, YouTube, Gmail"
      description: "Automated Shopping + remarketing"
      status: "deprecated"
      notes: "Replaced by Performance Max in 2022"

  csv_fields_campaign_report:
    identifiers:
      - field: "Campaign"
        description: "Campaign name"
      - field: "Campaign ID"
        description: "Unique numeric identifier"
      - field: "Campaign type"
        description: "Search, Display, Shopping, Video, Performance Max, Demand Gen, App"
      - field: "Campaign subtype"
        description: "Standard, Smart, etc."
      - field: "Campaign status"
        description: "Enabled, Paused, Removed"
    settings:
      - field: "Bid strategy type"
        description: "Manual CPC, Target CPA, Target ROAS, Maximize conversions, etc."
      - field: "Budget"
        description: "Daily budget amount"
      - field: "Budget type"
        description: "Daily or Shared"
      - field: "Networks"
        description: "Google Search, Search Partners, Display Network"
        audit_note: "Check if Search Partners is enabled — often wastes spend"
      - field: "Locations"
        description: "Targeted geographic locations"
      - field: "Excluded locations"
        description: "Negatively targeted locations"
      - field: "Location options (target)"
        description: "Presence, Presence or interest, Search interest"
        audit_note: "'Presence or interest' is default and can show ads to users outside target area"
      - field: "Languages"
        description: "Targeted languages"
      - field: "Ad schedule"
        description: "Day/time bid adjustments"
      - field: "Start date"
        description: "Campaign start date"
      - field: "End date"
        description: "Campaign end date (if set)"
      - field: "Device bid adj. (Mobile)"
        description: "Mobile bid adjustment percentage"
      - field: "Device bid adj. (Desktop)"
        description: "Desktop bid adjustment percentage"
      - field: "Device bid adj. (Tablet)"
        description: "Tablet bid adjustment percentage"
      - field: "Delivery method"
        description: "Standard (default)"
    performance:
      - field: "Impressions"
      - field: "Clicks"
      - field: "CTR"
      - field: "Avg. CPC"
      - field: "Cost"
      - field: "Conversions"
      - field: "Conv. rate"
      - field: "Cost / conv."
      - field: "Conv. value"
      - field: "Conv. value / cost"
        description: "ROAS"
      - field: "All conv."
      - field: "View-through conv."
    impression_share:
      - field: "Search impr. share"
      - field: "Search lost IS (budget)"
      - field: "Search lost IS (rank)"
      - field: "Search exact match IS"
      - field: "Display impr. share"
      - field: "Display lost IS (budget)"
      - field: "Display lost IS (rank)"
      - field: "Search abs. top IS"
        description: "Percentage of impressions shown as absolute top (position 1)"
      - field: "Search top IS"
        description: "Percentage of impressions shown in top positions"

  naming_conventions:
    description: >
      A consistent naming convention enables fast filtering, reporting,
      and bulk management. Check for a clear taxonomy.
    recommended_pattern: "{Brand/NonBrand}_{Country}_{CampaignType}_{Objective}_{Targeting}_{Date}"
    examples:
      - "NB_US_Search_LeadGen_Exact_2025Q1"
      - "Brand_UK_Shopping_Revenue_AllProducts"
      - "NB_FR_PMax_Sales_HighValue"
    audit_checks:
      - id: "struct_001"
        name: "Inconsistent naming convention"
        description: "Campaigns lack a uniform naming pattern making reporting difficult"
        detection: "Review Campaign column in export; check for systematic taxonomy"
        severity: "medium"
      - id: "struct_002"
        name: "No brand vs non-brand separation"
        description: "Brand and non-brand traffic mixed in same campaigns"
        detection: "Check if brand terms exist in non-brand campaigns via search terms report"
        severity: "high"

  ad_group_structure:
    description: >
      Ad groups should be tightly themed around a set of closely related
      keywords sharing the same intent and landing page.
    approaches:
      - name: "SKAGs (Single Keyword Ad Groups)"
        description: "One keyword per ad group for maximum control"
        status: "largely_outdated"
        notes: >
          Was popular pre-2020. With close variants expansion and RSAs,
          SKAGs provide diminishing returns and fragment data. Google's
          AI works better with consolidated ad groups.
      - name: "Themed Ad Groups"
        description: "3-15 closely related keywords per ad group sharing intent"
        status: "recommended"
        notes: "Balances control with enough data volume for Smart Bidding to optimize"
      - name: "STAG (Single Theme Ad Groups)"
        description: "Keywords grouped by single search intent theme"
        status: "recommended"
        notes: "Modern best practice; groups keywords by intent, not exact match"
    audit_checks:
      - id: "struct_003"
        name: "Too many keywords per ad group"
        description: "Ad groups with 30+ keywords likely cover multiple intents"
        detection: "Count keywords per ad group in keyword export"
        threshold: ">30 keywords per ad group"
        severity: "medium"
      - id: "struct_004"
        name: "Single ad per ad group"
        description: "Ad groups with only 1 RSA cannot benefit from ad testing"
        detection: "Count ads per ad group in ad report export"
        threshold: "<2 enabled ads per ad group"
        severity: "high"
      - id: "struct_005"
        name: "Ad groups with zero impressions (30d)"
        description: "Dormant ad groups add clutter and may indicate structural issues"
        detection: "Filter ad group report: Impressions = 0 in last 30 days"
        severity: "low"
      - id: "struct_006"
        name: "Missing ad group in campaign"
        description: "Campaigns with no enabled ad groups waste budget settings"
        detection: "Cross-reference campaign list with ad group list"
        severity: "critical"

  campaign_settings_audit:
    audit_checks:
      - id: "struct_007"
        name: "Search Partners enabled without monitoring"
        description: >
          Search Partners can waste 10-30% of budget on low-quality placements.
          Must be monitored via segment by Network in campaign report.
        detection: "Check Networks column; segment performance by Network (with search partners)"
        severity: "high"
        recommendation: "Segment by Network; disable if Search Partners CPA > 2x Search CPA"
      - id: "struct_008"
        name: "Display Network opted in on Search campaigns"
        description: "Search campaigns opted into Display Network dilute intent targeting"
        detection: "Check Networks column for 'Google Search, Display Network'"
        severity: "critical"
        recommendation: "Always opt out of Display Network on Search campaigns"
      - id: "struct_009"
        name: "Location targeting set to 'Presence or interest'"
        description: >
          Default 'Presence or interest' shows ads to people searching ABOUT
          a location, not only those physically there. Can waste budget.
        detection: "Check 'Location options (target)' in campaign settings export"
        severity: "high"
        recommendation: "Use 'Presence' for local businesses; 'Presence or interest' for ecommerce"
      - id: "struct_010"
        name: "No ad schedule set"
        description: "Ads running 24/7 without time-based optimization"
        detection: "Check Ad schedule column — blank means all hours"
        severity: "low"
        recommendation: "Analyze hour-of-day report; set schedule if clear performance patterns exist"
      - id: "struct_011"
        name: "Language targeting too broad"
        description: "Campaign set to 'All languages' showing ads to non-target users"
        detection: "Check Languages column in campaign export"
        severity: "medium"
      - id: "struct_012"
        name: "No end date on promotional campaigns"
        description: "Time-limited campaigns running indefinitely"
        detection: "Check End date field — blank means perpetual"
        severity: "low"

# ============================================================================
# SECTION 2: CONVERSION TRACKING AUDIT
# ============================================================================

conversion_tracking:

  description: >
    Conversion tracking is the foundation of all optimization in Google Ads.
    Without accurate tracking, Smart Bidding optimizes toward wrong signals
    and budget is wasted. This section covers all conversion types, windows,
    attribution, Enhanced Conversions, and value-based bidding requirements.

  conversion_types:
    - type: "Website"
      description: "Actions on your website (purchases, form submissions, page views)"
      tracking_methods:
        - "Google Ads tag (gtag.js or Google Tag Manager)"
        - "Import from Google Analytics 4"
      notes: "GA4 imports may have 24-48h lag; native Google Ads tag is real-time"
    - type: "App"
      description: "In-app actions (installs, in-app purchases, events)"
      tracking_methods:
        - "Firebase SDK"
        - "Third-party app analytics (Adjust, AppsFlyer, etc.)"
    - type: "Phone calls"
      description: "Calls from ads, calls to number on website, call clicks on mobile"
      tracking_methods:
        - "Google forwarding number"
        - "Call reporting from ads"
        - "Website call conversions (dynamic number insertion)"
      notes: "Call ads deprecated Feb 2026; use call assets on RSAs instead"
    - type: "Import"
      description: "Offline conversions uploaded from CRM (Salesforce, HubSpot, etc.)"
      tracking_methods:
        - "Manual CSV upload"
        - "Scheduled uploads"
        - "API-based (Zapier, direct integration)"
      subtypes:
        - "Click conversions (GCLID-based)"
        - "Call conversions (caller ID-based)"
        - "Store visits (aggregated, Google-estimated)"
        - "Store sales (first-party data upload)"
    - type: "Enhanced conversions for leads"
      description: "Hashed user-provided data sent with conversion to improve offline attribution"
      tracking_methods:
        - "Google Ads tag with user-provided data"
        - "Google Tag Manager with enhanced conversions variable"

  conversion_action_settings:
    csv_fields:
      - field: "Conversion action"
        description: "Name of the conversion action"
      - field: "Category"
        description: "Purchase, Lead, Page view, Sign-up, Other, etc."
      - field: "Source"
        description: "Website, App (Firebase), Import, Phone call"
      - field: "Status"
        description: "Enabled, Removed, or Hidden"
      - field: "Include in 'Conversions'"
        description: "Yes/No — determines if this action is used for bidding optimization"
      - field: "Attribution model"
        description: "Data-driven, Last click"
      - field: "Click-through conversion window"
        values: ["1 day", "7 days", "14 days", "30 days", "45 days", "60 days", "90 days"]
        default: "30 days"
      - field: "Engaged-view conversion window"
        values: ["Off", "1 day", "3 days", "7 days", "10 days", "14 days"]
        default: "3 days"
        description: "For video ads: user watches 10s+ of skippable ad then converts"
      - field: "View-through conversion window"
        values: ["Off", "1 day", "3 days", "7 days", "14 days", "30 days"]
        default: "1 day"
        description: "User sees but does not click ad, then converts"
      - field: "Counting"
        values: ["One (per click)", "Every"]
        notes: "Use 'One' for leads, 'Every' for purchases"
      - field: "Value"
        values: ["Use same value for each", "Use different values for each", "Don't use a value"]
      - field: "Enhanced conversions"
        values: ["On", "Off"]

  attribution_models:
    description: >
      Attribution models determine how conversion credit is distributed across
      touchpoints. Google deprecated 4 rule-based models in September 2023.
    current_models:
      - model: "Data-driven attribution (DDA)"
        status: "active — default for new conversion actions"
        description: >
          Uses Google's AI to analyze all touchpoints and assign fractional
          credit based on how much each interaction contributed to the
          conversion. Requires sufficient conversion volume to model.
        minimum_data: "~300 conversions and ~3,000 interactions in 30 days (approximate)"
        notes: "Falls back to last-click if insufficient data"
      - model: "Last click"
        status: "active"
        description: "100% credit to the last-clicked ad and keyword"
        notes: "Only remaining rule-based model; useful for comparison baseline"
    deprecated_models:
      - model: "First click"
        deprecated_date: "2023-09"
        description: "100% credit to first-clicked ad"
      - model: "Linear"
        deprecated_date: "2023-09"
        description: "Equal credit across all touchpoints"
      - model: "Time decay"
        deprecated_date: "2023-09"
        description: "More credit to touchpoints closer to conversion"
      - model: "Position-based"
        deprecated_date: "2023-09"
        description: "40% first, 40% last, 20% distributed to middle"
    notes: >
      Fewer than 3% of conversions used the deprecated models at time of sunset.
      Existing conversion actions on deprecated models were auto-migrated to DDA.

  enhanced_conversions:
    description: >
      Supplements standard tracking by sending hashed first-party customer data
      (email, phone, name, address) to Google for better conversion matching.
      Helps maintain accuracy in a cookieless environment.
    types:
      - name: "Enhanced conversions for web"
        description: "Hashed user data sent at time of website conversion"
        implementation: "Google Ads tag, GTM, or Google Ads API"
      - name: "Enhanced conversions for leads"
        description: "Associates website lead with downstream offline conversion using hashed data"
        implementation: "Tag captures hashed email at form submit; offline import matches GCLID"
    data_fields_accepted:
      - "Email address (SHA-256 hashed)"
      - "Phone number (SHA-256 hashed, E.164 format)"
      - "First name (SHA-256 hashed)"
      - "Last name (SHA-256 hashed)"
      - "Street address (SHA-256 hashed)"
      - "City"
      - "State"
      - "Country"
      - "Postal code"
    reported_impact: "5-10% more conversions recovered vs standard tracking alone"

  conversion_action_sets:
    description: >
      Groups of conversion actions that can be assigned to specific campaigns.
      Allows different campaigns to optimize for different goals.
    use_cases:
      - "Lead gen campaign optimizing for form submissions only"
      - "Ecommerce campaign optimizing for purchases only (excluding micro-conversions)"
      - "Separate online vs offline conversion sets for different campaign strategies"

  value_based_bidding_requirements:
    description: >
      Requirements to use Target ROAS or Maximize Conversion Value bidding.
    requirements:
      - "Conversion actions must have values assigned"
      - "Use 'Every' counting for purchases (or 'One' with values for leads)"
      - "At least 15 conversions in last 30 days (50+ recommended)"
      - "Consistent conversion volume (avoid long gaps)"
      - "New Customer Value Mode: requires setting value rules"
    value_rules:
      description: "Adjust conversion values based on audience, location, or device"
      types:
        - "Default value: static value for all conversions"
        - "Dynamic value: passed via tag (e.g., transaction revenue)"
        - "Value rules: multipliers based on audience, geo, device conditions"

  audit_checks:
    - id: "conv_001"
      name: "No conversion tracking installed"
      description: "Account has zero conversion actions or all are removed/disabled"
      detection: "Check conversion actions export; count enabled actions with Include in Conversions = Yes"
      severity: "critical"
    - id: "conv_002"
      name: "Counting misconfiguration"
      description: "Lead-gen conversions set to 'Every' instead of 'One', inflating conversion counts"
      detection: "Check Counting column on conversion actions export for lead categories"
      severity: "high"
    - id: "conv_003"
      name: "Attribution model not Data-driven"
      description: "Conversion actions still on Last Click when account has enough data for DDA"
      detection: "Check Attribution model column; cross-reference conversion volume"
      severity: "medium"
    - id: "conv_004"
      name: "Enhanced Conversions not enabled"
      description: "Missing first-party data matching in a cookieless era"
      detection: "Check Enhanced conversions column on conversion actions or screenshot settings"
      severity: "high"
    - id: "conv_005"
      name: "Conversion window too short"
      description: "Click-through window shorter than typical sales cycle loses late conversions"
      detection: "Compare conversion window to known sales cycle; 7-day window for B2B is too short"
      severity: "high"
      decision_tree: >
        IF sales_cycle <= 7 days THEN 30-day window is fine.
        IF sales_cycle 7-30 days THEN use 30-60 day window.
        IF sales_cycle > 30 days THEN use 60-90 day window.
    - id: "conv_006"
      name: "Micro-conversions included in primary conversions"
      description: "Page views, time on site, or scroll depth counted as primary conversions for bidding"
      detection: "Review all conversion actions with Include in Conversions = Yes; check category"
      severity: "high"
      recommendation: "Move micro-conversions to secondary (observation only); keep only business-meaningful actions as primary"
    - id: "conv_007"
      name: "No offline conversion import for lead gen"
      description: "Lead-gen account not importing downstream CRM conversions (MQL, SQL, closed/won)"
      detection: "Check Source column for 'Import' type conversion actions"
      severity: "high"
      recommendation: "Implement GCLID-based offline conversion import from CRM"
    - id: "conv_008"
      name: "No conversion values assigned"
      description: "Account cannot use value-based bidding (Target ROAS, Maximize Conversion Value)"
      detection: "Check Value column on conversion actions — all set to 'Don't use a value'"
      severity: "medium"
    - id: "conv_009"
      name: "Duplicate conversion tracking"
      description: "Same conversion tracked via both Google Ads tag AND GA4 import, both included in bidding"
      detection: "Look for duplicate conversion action names with different sources"
      severity: "critical"
    - id: "conv_010"
      name: "View-through window inflating conversions"
      description: "Display/Video campaigns with 30-day view-through window claiming organic conversions"
      detection: "Check View-through conversion window on conversion actions; segment conversions by type"
      severity: "medium"

# ============================================================================
# SECTION 3: KEYWORD STRATEGY AUDIT
# ============================================================================

keyword_strategy:

  description: >
    Evaluates keyword selection, match types, negative keyword coverage,
    search term quality, and Quality Score. Applies only to Search campaigns.

  match_types:
    - type: "Broad match"
      syntax: "keyword (no modifier)"
      description: "Matches searches related to the keyword meaning, including synonyms, related queries"
      status: "active — significantly improved by AI in 2024-2025"
      notes: >
        Google recommends broad match with Smart Bidding. However, without
        robust negative keyword lists and conversion tracking, broad match
        can waste significant budget on irrelevant queries.
    - type: "Phrase match"
      syntax: '"keyword"'
      description: "Matches searches that include the meaning of the keyword"
      status: "active"
      notes: "Absorbed the old Broad Match Modifier behavior in 2021"
    - type: "Exact match"
      syntax: "[keyword]"
      description: "Matches searches with the same meaning as the keyword"
      status: "active"
      notes: "Still matches close variants (plurals, misspellings, reorderings, implied words)"
    - type: "Broad Match Modifier (BMM)"
      syntax: "+keyword"
      description: "Required specific words to be present"
      status: "deprecated (2021)"
      notes: "Behavior absorbed into Phrase match"

  close_variants:
    description: >
      All match types now trigger on close variants including misspellings,
      singular/plural, stemmings, abbreviations, accents, and implied words.
      Exact match also matches reworded queries with same intent.
    impact: "Reduced control — must rely on negative keywords to exclude unwanted variants"

  csv_fields_keyword_report:
    - field: "Keyword"
    - field: "Match type"
      values: ["Broad", "Phrase", "Exact"]
    - field: "Keyword status"
      values: ["Eligible", "Paused", "Removed", "Below first page bid", "Rarely shown (low Quality Score)"]
    - field: "Max CPC"
      description: "Keyword-level bid (blank if using automated bidding)"
    - field: "Quality Score"
      range: "1-10 or '--' if insufficient data"
    - field: "Exp. CTR"
      values: ["Above average", "Average", "Below average"]
    - field: "Ad relevance"
      values: ["Above average", "Average", "Below average"]
    - field: "Landing page exp."
      values: ["Above average", "Average", "Below average"]
    - field: "Impressions"
    - field: "Clicks"
    - field: "CTR"
    - field: "Avg. CPC"
    - field: "Cost"
    - field: "Conversions"
    - field: "Conv. rate"
    - field: "Cost / conv."
    - field: "Conv. value"
    - field: "First page bid est."
    - field: "Top of page bid est."
    - field: "First position bid est."
    - field: "Search impr. share"

  negative_keywords:
    levels:
      - level: "Ad group negative"
        description: "Blocks searches for a specific ad group only"
      - level: "Campaign negative"
        description: "Blocks searches across all ad groups in the campaign"
      - level: "Account-level negative keyword list"
        description: "Shared negative keyword list applied to multiple campaigns"
        notes: "PMax campaigns now support campaign-level negatives (up to 10,000)"
    match_types:
      - "Broad negative (default — blocks queries containing all negative terms in any order)"
      - "Phrase negative (blocks queries containing exact phrase)"
      - "Exact negative (blocks only the exact query)"
    notes: >
      Negative keywords do NOT match close variants the same way positive
      keywords do. You must add misspellings, plural/singular forms manually.

  search_terms_report:
    description: >
      Shows actual search queries that triggered your ads. Essential for
      finding wasted spend and new keyword opportunities.
    csv_fields:
      - field: "Search term"
      - field: "Match type"
        description: "How the search term matched your keyword"
      - field: "Added / Excluded"
        description: "Whether term was added as keyword or negative"
      - field: "Keyword"
        description: "The keyword that was matched"
      - field: "Campaign"
      - field: "Ad group"
      - field: "Impressions"
      - field: "Clicks"
      - field: "Cost"
      - field: "Conversions"
      - field: "Conv. value"
    limitations: >
      Google hides search terms below a privacy threshold (insufficient
      unique users). Typically 20-30% of clicks may be in "Other search
      terms" category. PMax now shows search terms for Search/Shopping
      placements as of late 2025.

  brand_vs_nonbrand_segmentation:
    description: >
      Separating brand and non-brand keywords into different campaigns
      is critical for accurate performance measurement and budget control.
    reasons:
      - "Brand keywords have 2-5x higher CTR and conversion rates"
      - "Mixing inflates perceived performance of non-brand keywords"
      - "Separate budgets prevent brand from cannibalizing non-brand spend"
      - "Different bidding strategies appropriate for each"
    detection: >
      Filter search terms report for brand name variations.
      Check if brand keywords exist in non-brand campaigns.

  audit_checks:
    - id: "kw_001"
      name: "Broad match without Smart Bidding"
      description: "Broad match keywords used with Manual CPC — high risk of irrelevant spend"
      detection: "Cross-reference Match type = Broad with campaign Bid strategy type = Manual CPC"
      severity: "critical"
    - id: "kw_002"
      name: "No negative keywords"
      description: "Campaign or account has zero negative keywords"
      detection: "Export negative keywords; check if empty"
      severity: "critical"
    - id: "kw_003"
      name: "Search terms with high spend and zero conversions"
      description: "Individual search terms consuming budget without converting"
      detection: "Filter search terms: Cost > $50 AND Conversions = 0"
      threshold: "Varies by CPA target; flag terms spending > 2x target CPA with 0 conversions"
      severity: "high"
      formula: "wasted_spend = SUM(cost) WHERE conversions = 0 AND cost > (2 * target_CPA)"
    - id: "kw_004"
      name: "Negative keyword conflicts"
      description: "Negative keywords blocking intended positive keywords"
      detection: "Use Google Ads Editor conflict checker or compare negative list against positive keywords"
      severity: "high"
    - id: "kw_005"
      name: "Low Quality Score keywords"
      description: "Keywords with Quality Score 1-4 paying premium CPCs"
      detection: "Filter keyword report: Quality Score <= 4"
      threshold: "QS <= 4"
      severity: "high"
    - id: "kw_006"
      name: "Duplicate keywords across campaigns"
      description: "Same keyword in multiple campaigns causing self-competition"
      detection: "Sort keyword export by keyword text; identify duplicates across campaigns"
      severity: "medium"
    - id: "kw_007"
      name: "Keyword to ad relevance gap"
      description: "Keywords with 'Below average' ad relevance score"
      detection: "Filter keyword report: Ad relevance = Below average"
      severity: "medium"
    - id: "kw_008"
      name: "Stale search terms review"
      description: "Search terms report not reviewed in 30+ days"
      detection: "Check Change History for recent negative keyword additions"
      severity: "medium"
      recommendation: "Review search terms weekly for active campaigns, bi-weekly for stable ones"
    - id: "kw_009"
      name: "Over-reliance on exact match"
      description: "Account using only exact match keywords limiting reach and AI optimization"
      detection: "Check match type distribution; >90% exact match is over-constrained"
      severity: "low"

# ============================================================================
# SECTION 4: AD COPY & EXTENSIONS (ASSETS) AUDIT
# ============================================================================

ad_copy_and_assets:

  description: >
    Evaluates Responsive Search Ads (RSAs), ad strength, and all ad asset
    types (formerly called extensions). As of 2025, RSAs are the only
    standard ad format for Search campaigns. Expanded Text Ads (ETAs)
    were sunset in June 2022.

  responsive_search_ads:
    description: >
      RSAs allow up to 15 headlines (30 chars each) and 4 descriptions
      (90 chars each). Google's AI tests combinations to find best
      performing assemblies per auction.
    limits:
      max_headlines: 15
      max_descriptions: 4
      headline_max_chars: 30
      description_max_chars: 90
      min_headlines_required: 3
      min_descriptions_required: 2
      headlines_shown_per_auction: "2-3"
      descriptions_shown_per_auction: "1-2"
    best_practices:
      - "Provide 8-15 unique headlines with diverse messaging angles"
      - "Include keywords in at least 3 headlines"
      - "Vary headline length (some short, some using full 30 chars)"
      - "Include at least one headline with a CTA"
      - "Include at least one headline with a USP/value proposition"
      - "Include at least one headline with a number (price, stat, offer)"
      - "Provide 3-4 unique descriptions"
      - "Each description should make sense standalone"
      - "Avoid redundancy across headlines and descriptions"
    pinning:
      description: >
        Pinning forces a specific headline or description into a fixed
        position (1, 2, or 3 for headlines; 1 or 2 for descriptions).
      impact: "Reduces ad combinations tested; lowers Ad Strength score"
      when_to_pin:
        - "Legal/compliance disclaimers that must always appear"
        - "Brand name that must be in headline position 1"
        - "Price or offer that must be visible"
      tip: "Pin 2-3 assets to the same position to maintain some rotation"
    ad_strength:
      description: >
        Google's assessment of ad quality: Poor, Average, Good, Excellent.
        Based on asset diversity, relevance, and quantity.
      values: ["Poor", "Average", "Good", "Excellent"]
      impact_on_performance: >
        Google confirmed in 2024 that Ad Strength does NOT directly
        affect Ad Rank. However, 'Excellent' ads have more combinations
        to test and tend to perform better empirically.
      target: "Good or Excellent"

  csv_fields_ad_report:
    - field: "Ad group"
    - field: "Ad type"
      values: ["Responsive search ad", "Expanded text ad (legacy)", "Responsive display ad", "Call ad (deprecated)"]
    - field: "Ad status"
    - field: "Headline 1"
    - field: "Headline 2"
    - field: "Headline 3"
    - field: "Headline 4 through Headline 15"
    - field: "Description 1"
    - field: "Description 2"
    - field: "Description 3"
    - field: "Description 4"
    - field: "Final URL"
    - field: "Path 1"
    - field: "Path 2"
    - field: "Ad strength"
    - field: "Impressions"
    - field: "Clicks"
    - field: "CTR"
    - field: "Conversions"
    - field: "Labels"

  asset_types:
    description: >
      Assets (formerly extensions) enhance ads with additional information
      and increase clickable area. They can be set at account, campaign,
      or ad group level.
    types:
      - name: "Sitelinks"
        description: "Additional links to specific pages on your site"
        fields: ["Link text (25 chars)", "Description line 1 (35 chars)", "Description line 2 (35 chars)", "Final URL"]
        minimum_recommended: 4
        notes: "Show up to 4 on desktop, 2 on mobile"
      - name: "Callouts"
        description: "Short highlight phrases (free shipping, 24/7 support)"
        fields: ["Callout text (25 chars)"]
        minimum_recommended: 4
        notes: "Non-clickable; show 2-6 callouts"
      - name: "Structured snippets"
        description: "Predefined header + list of values (Brands: X, Y, Z)"
        fields: ["Header (predefined category)", "Values (25 chars each)"]
        headers: ["Amenities", "Brands", "Courses", "Degree programs", "Destinations",
                  "Featured hotels", "Insurance coverage", "Models", "Neighborhoods",
                  "Service catalog", "Shows", "Styles", "Types"]
        minimum_recommended: 4 values per header
      - name: "Call assets"
        description: "Phone number displayed with the ad"
        fields: ["Phone number", "Country code"]
        notes: "Replacing deprecated standalone Call Ads from Feb 2026"
      - name: "Location assets"
        description: "Business address from linked Google Business Profile"
        fields: ["Auto-populated from Google Business Profile"]
        notes: "Requires linked Google Business Profile"
      - name: "Price assets"
        description: "Showcase products/services with prices"
        fields: ["Type", "Header (25 chars)", "Price", "Price unit", "Description (25 chars)", "Final URL"]
        notes: "Show 3-8 price items"
      - name: "Promotion assets"
        description: "Highlight sales and special offers"
        fields: ["Occasion", "Promotion type (monetary/percent discount)", "Item (20 chars)", "Final URL", "Dates"]
      - name: "Image assets"
        description: "Images displayed alongside search ads"
        fields: ["Image (landscape 1.91:1 or square 1:1)", "Alt text"]
        requirements: "Account must have 90+ days history and active campaigns"
      - name: "Business name"
        description: "Verified business name shown above headline"
        notes: "Requires advertiser verification"
      - name: "Business logo"
        description: "Logo shown with the ad"
        notes: "Requires advertiser verification; square format"
      - name: "Lead form assets"
        description: "In-ad lead form (removed from new campaign creation 2024)"
        status: "limited"

  ad_customizers:
    description: >
      Dynamic content insertion into ads based on audience, location,
      device, or time. Includes countdown timers and IF functions.
    types:
      - name: "Keyword insertion"
        syntax: "{KeyWord:default text}"
        description: "Inserts the user's search query into the ad headline/description"
      - name: "Countdown"
        syntax: "{=COUNTDOWN(sale_end_date)}"
        description: "Dynamic countdown to a date"
      - name: "IF functions"
        syntax: "{=IF(device=mobile,Mobile CTA):Default CTA}"
        description: "Show different text based on device or audience"
      - name: "Ad customizer attributes"
        description: "Feed-based dynamic insertion of text, numbers, prices, dates"
        notes: "Set up via Business data feeds in Google Ads"

  audit_checks:
    - id: "ad_001"
      name: "RSA with fewer than 8 headlines"
      description: "Under-utilizing RSA headline slots reduces combination testing"
      detection: "Count non-empty Headline columns per ad in export"
      threshold: "<8 headlines"
      severity: "medium"
    - id: "ad_002"
      name: "Ad Strength is Poor"
      description: "Ads rated 'Poor' have limited asset variety"
      detection: "Filter ad report: Ad strength = Poor"
      severity: "high"
    - id: "ad_003"
      name: "No sitelink assets"
      description: "Missing sitelinks reduces ad real estate and CTR"
      detection: "Check extensions/assets export for sitelinks; count per campaign"
      severity: "high"
    - id: "ad_004"
      name: "No callout assets"
      description: "Missing callouts to highlight USPs"
      detection: "Check extensions/assets export for callouts"
      severity: "medium"
    - id: "ad_005"
      name: "No structured snippets"
      description: "Missing structured snippets for additional context"
      detection: "Check extensions/assets export for structured snippets"
      severity: "medium"
    - id: "ad_006"
      name: "Missing image assets on Search"
      description: "Image assets can increase CTR by 10%+ on eligible Search ads"
      detection: "Check extensions/assets export for image assets"
      severity: "low"
    - id: "ad_007"
      name: "Excessive pinning"
      description: "All headline positions pinned, eliminating AI optimization benefit"
      detection: "Check pin columns in ad export; count pinned vs unpinned headlines"
      severity: "medium"
    - id: "ad_008"
      name: "Duplicate ad copy across ad groups"
      description: "Same headlines/descriptions used in multiple ad groups reduce relevance"
      detection: "Compare headline columns across ad groups"
      severity: "low"
    - id: "ad_009"
      name: "No mobile-specific assets or messaging"
      description: "No mobile-preferred ads or mobile-specific callouts"
      detection: "Check for mobile bid adjustments and mobile-specific assets"
      severity: "low"
    - id: "ad_010"
      name: "Broken final URLs"
      description: "Ad landing pages returning 4xx/5xx errors"
      detection: "Export Final URL column; crawl for HTTP status codes"
      severity: "critical"
    - id: "ad_011"
      name: "Legacy Expanded Text Ads still running"
      description: "ETAs can still serve but cannot be edited; should compare vs RSA performance"
      detection: "Filter ad report: Ad type = Expanded text ad AND Status = Enabled"
      severity: "low"

# ============================================================================
# SECTION 5: SMART BIDDING AUDIT
# ============================================================================

smart_bidding:

  description: >
    Evaluates bidding strategy selection, configuration, and performance.
    Smart Bidding uses Google's AI to optimize bids in real time using
    70+ billion auction signals.

  strategies:
    - name: "Target CPA (tCPA)"
      type: "smart_bidding"
      goal: "Get as many conversions as possible at target cost-per-acquisition"
      available_on: ["Search", "Display", "App", "Demand Gen"]
      requirements:
        - "Conversion tracking enabled"
        - "Recommended: 30+ conversions in last 30 days"
        - "Minimum: 15 conversions in last 30 days"
      settings:
        - "Target CPA amount"
        - "Set as portfolio or standard strategy"
      notes: "Now a sub-option of Maximize Conversions (set optional tCPA target)"
    - name: "Target ROAS (tROAS)"
      type: "smart_bidding"
      goal: "Maximize conversion value at target return on ad spend"
      available_on: ["Search", "Shopping", "Display", "App", "Demand Gen", "PMax"]
      requirements:
        - "Conversion tracking with values"
        - "Recommended: 50+ conversions with values in last 30 days"
        - "Minimum: 15 conversions in last 30 days"
      settings:
        - "Target ROAS percentage (e.g., 400% means $4 revenue per $1 spend)"
      notes: "Now a sub-option of Maximize Conversion Value (set optional tROAS target)"
    - name: "Maximize Conversions"
      type: "smart_bidding"
      goal: "Get the most conversions within budget"
      available_on: ["Search", "Display", "Demand Gen", "PMax"]
      requirements:
        - "Conversion tracking enabled"
      settings:
        - "Optional: Target CPA"
      notes: "Without a tCPA cap, will spend entire budget aggressively"
    - name: "Maximize Conversion Value"
      type: "smart_bidding"
      goal: "Get the most conversion value within budget"
      available_on: ["Search", "Shopping", "Demand Gen", "PMax"]
      requirements:
        - "Conversion tracking with values"
      settings:
        - "Optional: Target ROAS"
      notes: "Without a tROAS target, will spend entire budget chasing highest value"
    - name: "Maximize Clicks"
      type: "automated_bidding"
      goal: "Get the most clicks within budget"
      available_on: ["Search", "Display"]
      requirements: "None"
      settings:
        - "Optional: Maximum CPC bid limit"
      notes: "Not Smart Bidding (no conversion optimization). Use only for traffic/awareness goals"
    - name: "Manual CPC"
      type: "manual"
      goal: "Full manual control over keyword bids"
      available_on: ["Search", "Display"]
      notes: "No AI optimization. Suitable for very small accounts or testing"
    - name: "Enhanced CPC (eCPC)"
      type: "semi_automated"
      goal: "Adjust manual bids up/down based on conversion likelihood"
      status: "deprecated"
      deprecated_date: "2025-03"
      notes: >
        Deprecated March 31, 2025. Existing campaigns auto-migrated to
        Manual CPC. Google recommends switching to fully automated bidding.
    - name: "Target Impression Share"
      type: "automated_bidding"
      goal: "Show ads at target position (absolute top, top, anywhere)"
      available_on: ["Search"]
      settings:
        - "Location: Absolute top, Top of page, Anywhere on page"
        - "Target impression share percentage"
        - "Maximum CPC bid limit"
      notes: "Use for brand campaigns where visibility is the goal"

  portfolio_vs_standard:
    portfolio:
      description: "Single bidding strategy shared across multiple campaigns"
      benefits:
        - "Pools conversion data across campaigns for faster learning"
        - "Optimizes spend allocation across campaigns"
        - "Set one CPA/ROAS target for related campaigns"
      where_to_find: "Tools & Settings > Shared Library > Bid strategies"
    standard:
      description: "Bidding strategy applied to one campaign only"
      benefits:
        - "Independent optimization per campaign"
        - "Appropriate when campaigns have different goals or margins"

  bid_adjustments:
    description: >
      Bid adjustments modify bids by percentage for specific segments.
      With Smart Bidding, most bid adjustments are IGNORED because the AI
      handles them automatically.
    adjustments_with_smart_bidding:
      respected:
        - "Device: -100% only (to exclude a device entirely)"
        - "Audiences: Observation mode adjustments ignored by Smart Bidding"
      ignored:
        - "Location bid adjustments (Smart Bidding handles geo signals)"
        - "Ad schedule bid adjustments (Smart Bidding handles time-of-day)"
        - "Device bid adjustments other than -100%"
        - "Demographic bid adjustments"
    adjustments_with_manual_cpc:
      all_respected: true
      types: ["Device", "Location", "Ad schedule", "Demographics (age, gender, income)", "Audiences"]

  auction_insights:
    description: >
      Competitive benchmarking report showing how your ads compare to
      competitors in the same auctions.
    csv_fields:
      - field: "Display URL domain"
        description: "Competitor domain"
      - field: "Impression share"
      - field: "Overlap rate"
        description: "How often competitor's ad showed when yours did"
      - field: "Position above rate"
        description: "How often competitor's ad ranked above yours"
      - field: "Top of page rate"
      - field: "Abs. top of page rate"
      - field: "Outranking share"
        description: "How often your ad ranked higher or showed when theirs didn't"
    notes: "Available for Search and Shopping campaigns only"

  impression_share_metrics:
    formulas:
      search_impression_share: "Impressions / Eligible Impressions"
      search_lost_is_budget: "% of eligible impressions lost due to insufficient budget"
      search_lost_is_rank: "% of eligible impressions lost due to poor Ad Rank"
      search_exact_match_is: "Impressions / Eligible impressions for exact match queries"
      search_abs_top_is: "Impressions at absolute top / Eligible top impressions"
      search_top_is: "Impressions in top / Eligible top impressions"
    relationships: >
      Impression Share = 100% - Lost IS (Budget) - Lost IS (Rank) - Other factors.
      If Lost IS (Budget) is high: increase budget or narrow targeting.
      If Lost IS (Rank) is high: improve Quality Score, increase bids, or improve ads.

  audit_checks:
    - id: "bid_001"
      name: "Smart Bidding without enough conversion data"
      description: "Target CPA or ROAS used with fewer than 15 conversions in 30 days"
      detection: "Check conversions in last 30 days per campaign; compare to bidding strategy"
      threshold: "<15 conversions/30 days with tCPA or tROAS"
      severity: "high"
    - id: "bid_002"
      name: "Maximize Conversions without CPA cap"
      description: "Campaign spending entire budget without cost efficiency guardrail"
      detection: "Bid strategy = Maximize Conversions AND no Target CPA set"
      severity: "medium"
      recommendation: "Add a Target CPA based on historical CPA (start at 120% of recent avg CPA)"
    - id: "bid_003"
      name: "Unrealistic Target CPA or ROAS"
      description: "Target set far below/above historical performance"
      detection: "Compare target CPA/ROAS to actual CPA/ROAS over last 30-60 days"
      threshold: "Target CPA < 50% of actual CPA, or Target ROAS > 200% of actual ROAS"
      severity: "high"
      recommendation: "Set targets within 20% of actual; adjust gradually (10-15% every 2 weeks)"
    - id: "bid_004"
      name: "eCPC still in use (deprecated)"
      description: "Campaign still showing Enhanced CPC — should have migrated"
      detection: "Bid strategy type = Enhanced CPC"
      severity: "high"
    - id: "bid_005"
      name: "Manual CPC on high-volume campaign"
      description: "Campaign with 50+ monthly conversions not leveraging Smart Bidding"
      detection: "Bid strategy = Manual CPC AND Conversions > 50 in last 30 days"
      severity: "medium"
    - id: "bid_006"
      name: "High impression share lost to budget"
      description: "Budget-limited campaign losing significant eligible impressions"
      detection: "Search lost IS (budget) > 20%"
      threshold: ">20%"
      severity: "high"
      recommendation: "Increase budget for campaigns with strong CPA/ROAS performance"
    - id: "bid_007"
      name: "High impression share lost to rank"
      description: "Poor Ad Rank causing ad suppression"
      detection: "Search lost IS (rank) > 30%"
      threshold: ">30%"
      severity: "medium"
      recommendation: "Improve Quality Score components or increase bids"
    - id: "bid_008"
      name: "Bidding strategy changed too frequently"
      description: "Frequent strategy changes prevent learning; algorithm needs 2-4 weeks to stabilize"
      detection: "Check Change History for bid strategy changes; flag if changed more than once per month"
      severity: "medium"

# ============================================================================
# SECTION 6: SHOPPING & PERFORMANCE MAX AUDIT
# ============================================================================

shopping_and_pmax:

  description: >
    Evaluates product feed quality, Merchant Center health, PMax asset
    groups, audience signals, search themes, and listing group structure.

  product_feed_quality:
    description: >
      Product feed is the foundation of Shopping and PMax campaigns.
      Feed quality directly impacts ad eligibility, impression share,
      and conversion rate.
    required_fields:
      - field: "id"
        description: "Unique product identifier"
      - field: "title"
        max_chars: 150
        best_practice: "Include brand, product type, key attributes (color, size, material). Front-load important keywords."
        audit_tip: "Titles under 70 chars are truncated on mobile; optimize first 70 chars"
      - field: "description"
        max_chars: 5000
        best_practice: "Detailed description with keywords; avoid promotional text"
      - field: "link"
        description: "Landing page URL"
      - field: "image_link"
        requirements: "Min 100x100 px (non-apparel), 250x250 px (apparel). No watermarks, placeholders."
      - field: "price"
        description: "Must match landing page price exactly"
        audit_tip: "Price mismatch is the #1 cause of product disapprovals"
      - field: "availability"
        values: ["in_stock", "out_of_stock", "preorder", "backorder"]
        audit_tip: "Must match website availability; mismatch causes disapproval"
      - field: "brand"
      - field: "gtin"
        description: "Global Trade Item Number (UPC, EAN, ISBN)"
        audit_tip: "Missing GTIN reduces visibility; required for known branded products"
      - field: "mpn"
        description: "Manufacturer Part Number (if no GTIN)"
      - field: "condition"
        values: ["new", "refurbished", "used"]
      - field: "google_product_category"
        description: "Google's product taxonomy"
      - field: "product_type"
        description: "Your own category path"
    recommended_fields:
      - field: "additional_image_link"
        description: "Up to 10 additional images"
      - field: "sale_price"
      - field: "sale_price_effective_date"
      - field: "color"
      - field: "size"
      - field: "material"
      - field: "pattern"
      - field: "item_group_id"
        description: "Groups product variants together"
      - field: "shipping"
      - field: "tax"
      - field: "custom_label_0 through custom_label_4"
        description: "For campaign segmentation (margin tier, season, bestseller, etc.)"

  merchant_center_errors:
    severity_levels:
      - level: "Account-level issues"
        description: "Affect entire account (suspension risk)"
        examples:
          - "Misrepresentation"
          - "Website claim issues"
          - "Missing return policy"
          - "Checkout issues"
      - level: "Feed-level issues"
        description: "Affect all products in a feed"
        examples:
          - "Processing errors (invalid format, encoding)"
          - "Schema validation failures"
      - level: "Product-level issues (errors)"
        description: "Individual products disapproved"
        examples:
          - "Price mismatch with landing page"
          - "Availability mismatch"
          - "Missing required attributes (GTIN, shipping)"
          - "Image quality issues"
          - "Policy violations"
      - level: "Product-level issues (warnings)"
        description: "Products eligible but performance limited"
        examples:
          - "Missing optional attributes"
          - "Low image quality"
          - "Generic titles"
    feed_health_metrics:
      - "Total products submitted"
      - "Active / approved products"
      - "Disapproved products (count and %)"
      - "Expiring products"
      - "Products pending review"

  pmax_asset_groups:
    description: >
      Asset groups are PMax's equivalent of ad groups. Each contains
      creative assets and targeting signals.
    asset_limits:
      text:
        headlines: {min: 3, max: 15, char_limit: 30}
        long_headlines: {min: 1, max: 5, char_limit: 90}
        descriptions: {min: 2, max: 5, char_limit: 90}
        business_name: {min: 1, max: 1, char_limit: 25}
      images:
        landscape: {min: 1, max: 20, ratio: "1.91:1", min_size: "600x314"}
        square: {min: 1, max: 20, ratio: "1:1", min_size: "300x300"}
        portrait: {min: 0, max: 20, ratio: "4:5", min_size: "480x600"}
      logos:
        square: {min: 1, max: 5, ratio: "1:1", min_size: "128x128"}
        landscape: {min: 0, max: 5, ratio: "4:1", min_size: "512x128"}
      videos:
        count: {min: 0, max: 5}
        min_duration: "10 seconds"
        notes: "If no video provided, Google auto-generates one (quality varies)"

  audience_signals:
    description: >
      Audience signals are SUGGESTIONS, not hard targeting. They help
      Google's AI start optimization faster but the algorithm will
      expand beyond these signals based on conversion data.
    signal_types:
      - type: "Custom segments"
        description: "Based on search terms, URLs, or apps your ideal customers use"
      - type: "Your data"
        description: "Customer Match lists, website visitors, app users"
      - type: "Interests & demographics"
        description: "In-market, affinity, life events, detailed demographics"
    best_practices:
      - "Always include at least one audience signal per asset group"
      - "Use Customer Match lists of high-value customers as top-priority signal"
      - "Add competitor URLs and industry keywords as custom segments"
      - "Create separate asset groups for different audience themes"
      - "Do NOT rely on signals as sole targeting — they are directional only"

  search_themes:
    description: >
      Keywords that guide PMax toward relevant Search and Shopping queries.
      Behave like broad match — guide direction, not exact targeting.
    limits:
      per_asset_group: 50  # Increased from 25 in 2025
    best_practices:
      - "Add themes that represent your core product/service categories"
      - "Include brand terms if you want PMax to cover brand searches"
      - "Exclude brand terms via campaign negatives if separate brand campaign exists"
      - "Review search terms report to see which themes drive conversions"

  listing_groups:
    description: >
      For Shopping-based PMax, listing groups define which products are
      included/excluded per asset group. Equivalent to product groups
      in standard Shopping campaigns.
    segmentation_dimensions:
      - "Category (Google product category)"
      - "Brand"
      - "Item ID"
      - "Condition"
      - "Product type"
      - "Channel (Online / Local)"
      - "Custom label 0-4"

  feed_only_vs_full_pmax:
    feed_only:
      description: "PMax campaign with product feed but no additional creative assets"
      behavior: "Acts like Smart Shopping — runs primarily on Shopping and Search placements"
      when_to_use: "When you want Shopping-like behavior with PMax's bidding capabilities"
    full_pmax:
      description: "PMax with both product feed and full asset groups (images, videos, text)"
      behavior: "Runs across all Google networks including Display, YouTube, Discover"
      when_to_use: "When you want full cross-channel reach"

  audit_checks:
    - id: "shop_001"
      name: "High product disapproval rate"
      description: "More than 10% of products disapproved in Merchant Center"
      detection: "Check Merchant Center diagnostics: Disapproved / Total submitted"
      threshold: ">10% disapproval rate"
      severity: "critical"
    - id: "shop_002"
      name: "Missing GTINs on branded products"
      description: "Products from known brands missing GTIN, reducing Shopping visibility"
      detection: "Filter feed export: brand is not empty AND gtin is empty"
      severity: "high"
    - id: "shop_003"
      name: "Generic product titles"
      description: "Titles lacking brand, attributes, or specificity"
      detection: "Review title column in feed; flag titles under 30 chars or missing brand"
      severity: "high"
    - id: "shop_004"
      name: "No audience signals in PMax"
      description: "PMax running without audience signals — slower optimization"
      detection: "Screenshot PMax asset group settings; check audience signals section"
      severity: "high"
    - id: "shop_005"
      name: "PMax auto-generated videos"
      description: "No custom videos uploaded; Google creating low-quality auto-videos"
      detection: "Check video assets in PMax; if 0 uploaded, auto-generated are serving"
      severity: "medium"
    - id: "shop_006"
      name: "Single asset group for all products"
      description: "No segmentation by product category, margin, or audience"
      detection: "Count asset groups per PMax campaign"
      severity: "medium"
    - id: "shop_007"
      name: "Price/availability mismatch"
      description: "Feed prices or stock status don't match landing page"
      detection: "Merchant Center diagnostics; compare feed vs landing page spot-checks"
      severity: "critical"
    - id: "shop_008"
      name: "No custom labels for bidding segmentation"
      description: "Missing margin tiers, seasonality, or priority labels in feed"
      detection: "Check custom_label_0 through custom_label_4 columns in feed export"
      severity: "medium"
    - id: "shop_009"
      name: "PMax cannibalizing brand Search"
      description: "PMax capturing brand queries that should go to dedicated brand Search campaign"
      detection: "Review PMax search terms report for brand keywords; check search term overlap"
      severity: "high"
      recommendation: "Add brand terms as campaign-level negatives on PMax; run dedicated brand Search campaign"
    - id: "shop_010"
      name: "Feed not updated frequently"
      description: "Product feed older than 24 hours may have stale prices/availability"
      detection: "Check feed fetch schedule in Merchant Center"
      threshold: "Feed update interval > 24 hours"
      severity: "medium"

# ============================================================================
# SECTION 7: AUDIENCE & TARGETING AUDIT
# ============================================================================

audience_and_targeting:

  description: >
    Evaluates audience segment usage, targeting modes, demographic
    targeting, and placement controls across campaign types.

  audience_segment_types:
    - type: "In-market segments"
      description: "Users actively researching or comparing products/services in a category"
      available_on: ["Search", "Display", "Video", "Demand Gen", "PMax (as signal)"]
      status: "active"
    - type: "Affinity segments"
      description: "Users with sustained interests, habits, and passions"
      available_on: ["Search", "Display", "Video", "Demand Gen", "PMax (as signal)"]
      status: "active"
    - type: "Custom segments"
      description: "User-defined audiences based on search terms, URLs, apps"
      available_on: ["Display", "Video", "Demand Gen", "PMax (as signal)"]
      status: "active"
      notes: "Expanded to Display campaigns in 2025"
    - type: "Life events"
      description: "Users experiencing milestones (graduation, moving, marriage, new job)"
      available_on: ["Display", "Video", "Demand Gen", "PMax (as signal)"]
      status: "active"
    - type: "Detailed demographics"
      description: "Parental status, marital status, education, homeownership, employer size"
      available_on: ["Search", "Display", "Video", "Demand Gen"]
      status: "active"
    - type: "Your data segments (Remarketing)"
      description: "Website visitors, app users, YouTube engagers, Customer Match"
      subtypes:
        - "Website visitors (Google Ads tag or GA4)"
        - "App users (Firebase)"
        - "YouTube users (channel engagers, video viewers)"
        - "Customer Match (email/phone/address list upload)"
      status: "active"
      minimum_list_size: 100  # Reduced from 1,000 in 2025
    - type: "Lookalike segments"
      description: "Users similar to a seed audience list"
      available_on: ["Demand Gen only"]
      status: "active (evolving)"
      requirements:
        - "Seed list minimum: 1,000 active matched members"
      notes: >
        Transitioning from hard targeting to audience suggestions in
        March 2026. Only available in Demand Gen campaigns.
    - type: "Similar audiences"
      description: "Audiences similar to remarketing lists"
      status: "deprecated (May 2023)"
      replacement: "Optimized targeting, audience expansion, Lookalike segments"

  customer_match_updates_2025:
    - "540-day membership cap enforced from April 7, 2025"
    - "Lists must have 100+ members added/updated within 540 days to stay eligible"
    - "Policy update January 2025: accounts may lose access if ads cause harm"
    - "Minimum audience size reduced to 100 members across all networks (was 1,000)"

  targeting_modes:
    - mode: "Targeting"
      description: "Only show ads to people in the selected audience segment"
      use_case: "Remarketing campaigns, Customer Match campaigns"
    - mode: "Observation"
      description: "Show ads to everyone but track audience performance; can add bid adjustments"
      use_case: "Search campaigns — add audiences for reporting without restricting reach"
      notes: "Bid adjustments on Observation audiences are IGNORED by Smart Bidding"

  demographic_targeting:
    dimensions:
      - "Age: 18-24, 25-34, 35-44, 45-54, 55-64, 65+, Unknown"
      - "Gender: Male, Female, Unknown"
      - "Household income (US only): Top 10%, 11-20%, 21-30%, 31-40%, 41-50%, Lower 50%, Unknown"
      - "Parental status: Parent, Not a parent, Unknown"
    notes: >
      Always keep 'Unknown' included — it typically represents 20-40% of traffic.
      Excluding Unknown loses significant volume. Use bid adjustments instead.

  placement_exclusions:
    applies_to: ["Display", "Video", "Demand Gen", "PMax"]
    types:
      - "Website/URL exclusions"
      - "App exclusions"
      - "YouTube channel/video exclusions"
      - "Content type exclusions (DL-G, DL-PG, DL-T, DL-MA)"
      - "Sensitive content exclusions (tragedy, conflict, profanity)"
      - "Topic exclusions"
    common_exclusions:
      - "mobileapps::2-com.google.android.apps.youtube.kids (kids app)"
      - "adsenseformobileapps.com (all mobile apps — legacy)"
      - "Games, Parked domains, Error pages"

  audit_checks:
    - id: "aud_001"
      name: "No remarketing audiences set up"
      description: "Account not leveraging website visitor or customer data"
      detection: "Check Audience Manager; look for remarketing lists with 0 members or none created"
      severity: "high"
    - id: "aud_002"
      name: "No Customer Match lists"
      description: "First-party customer data not uploaded for targeting/signals"
      detection: "Check Audience Manager > Customer lists"
      severity: "medium"
    - id: "aud_003"
      name: "Audiences only in Observation mode on Display"
      description: "Display campaigns relying on topic/placement targeting without audience targeting"
      detection: "Check audience targeting mode on Display campaigns"
      severity: "medium"
    - id: "aud_004"
      name: "No placement exclusions on Display/Video"
      description: "Ads showing on low-quality or brand-unsafe placements"
      detection: "Check placement exclusion list; review Placements report (Where ads showed)"
      severity: "high"
    - id: "aud_005"
      name: "Unknown demographics excluded"
      description: "Excluding 'Unknown' age/gender loses 20-40% of potential traffic"
      detection: "Check demographic targeting exclusions in campaign settings"
      severity: "medium"
    - id: "aud_006"
      name: "Stale remarketing lists"
      description: "Remarketing lists with membership duration > 540 days or very small size"
      detection: "Check audience list sizes and recency in Audience Manager"
      severity: "low"

# ============================================================================
# SECTION 8: BUDGET & SPEND AUDIT
# ============================================================================

budget_and_spend:

  description: >
    Evaluates budget allocation, pacing, wasted spend, and cost efficiency
    across the account.

  budget_types:
    - type: "Daily budget"
      description: "Google can spend up to 2x daily budget on high-opportunity days"
      notes: "Monthly spend will not exceed daily budget x 30.4"
    - type: "Shared budget"
      description: "Single budget pool shared across multiple campaigns"
      pros: "Automatic allocation to highest-performing campaigns"
      cons: "Less control; one campaign can consume disproportionate share"
      where_to_find: "Tools & Settings > Shared Library > Shared budgets"
    - type: "Campaign total budget"
      description: "Fixed total budget over campaign lifetime"
      available_on: ["Video", "some campaign types"]

  csv_fields_budget_analysis:
    - field: "Budget"
    - field: "Cost"
    - field: "Search lost IS (budget)"
    - field: "Impressions"
    - field: "Conversions"
    - field: "Cost / conv."
    - field: "Conv. value"
    - field: "Conv. value / cost"

  wasted_spend_detection:
    categories:
      - category: "Irrelevant search terms"
        formula: "SUM(Cost) FROM search_terms WHERE Conversions = 0 AND Cost > target_CPA"
        description: "Money spent on queries that never convert"
      - category: "Low QS keywords"
        formula: "SUM(Cost) FROM keywords WHERE Quality_Score <= 3"
        description: "Keywords with terrible relevance paying premium CPCs"
      - category: "Display placements with zero conversions"
        formula: "SUM(Cost) FROM placements WHERE Conversions = 0 AND Clicks > 50"
        description: "Display sites generating clicks but no conversions"
      - category: "Search Partners overspend"
        formula: "Compare CPA for 'Google Search' segment vs 'Search Partners' segment"
        description: "Search Partners converting at significantly higher CPA"
      - category: "Geographic waste"
        formula: "SUM(Cost) FROM geo_report WHERE Conversions = 0 AND Cost > threshold"
        description: "Locations spending budget without converting"

  budget_pacing:
    description: >
      Compare daily/monthly spend to budget to identify under-spending
      (opportunity cost) or over-reliance on Google's auto-pacing.
    formula: "Daily pacing = Cost to date / Days elapsed. Budget on track if within 10% of expected."
    decision_tree: >
      IF Search lost IS (budget) > 10% AND CPA < target:
        THEN increase budget (high-performing campaign constrained).
      IF Search lost IS (budget) > 10% AND CPA > target:
        THEN improve Quality Score or tighten targeting before increasing budget.
      IF Search lost IS (budget) = 0% AND daily spend < 70% of budget:
        THEN targeting is too narrow or bids too low; expand keywords or raise bids.

  audit_checks:
    - id: "bud_001"
      name: "Budget-limited high-performing campaigns"
      description: "Campaign with strong CPA/ROAS losing impressions due to budget"
      detection: "Search lost IS (budget) > 10% AND Cost/conv < account avg CPA"
      severity: "critical"
      recommendation: "Reallocate budget from underperforming campaigns"
    - id: "bud_002"
      name: "Overfunded low-performing campaigns"
      description: "Campaign spending full budget with poor CPA/ROAS"
      detection: "Cost/conv > 2x target CPA AND Search lost IS (budget) < 5%"
      severity: "high"
    - id: "bud_003"
      name: "Shared budget masking performance"
      description: "Shared budget causing one campaign to starve another"
      detection: "Check shared budgets; compare impression share across campaigns sharing budget"
      severity: "medium"
    - id: "bud_004"
      name: "Wasted spend on non-converting search terms"
      description: "Significant spend on search terms with zero conversions"
      detection: "Search terms report: SUM(Cost) WHERE Conversions = 0"
      severity: "high"
      formula: "wasted_pct = SUM(Cost WHERE Conv=0) / Total Cost * 100"
      threshold: ">20% of total spend on zero-conversion terms"
    - id: "bud_005"
      name: "No budget allocation strategy"
      description: "Budgets distributed evenly instead of based on performance"
      detection: "Review budget distribution vs ROAS/CPA performance across campaigns"
      severity: "medium"
    - id: "bud_006"
      name: "CPA trending upward"
      description: "Cost per acquisition increasing month-over-month"
      detection: "Compare Cost/conv across 3+ monthly periods"
      severity: "medium"
      formula: "cpa_trend = (current_month_CPA - prev_month_CPA) / prev_month_CPA * 100"
      threshold: ">15% increase month-over-month for 2+ consecutive months"

# ============================================================================
# SECTION 9: QUALITY SCORE DEEP DIVE
# ============================================================================

quality_score:

  description: >
    Quality Score (QS) is a 1-10 diagnostic tool at the keyword level that
    reflects the quality of your ads, keywords, and landing pages. It directly
    influences Ad Rank and actual CPC.

  formula:
    ad_rank: "Ad Rank = Max CPC Bid x Quality Score x Expected impact of assets x Ad Rank thresholds + Context signals"
    actual_cpc: "Actual CPC = (Ad Rank of advertiser below you / Your Quality Score) + $0.01"
    qs_impact: "A QS of 10 can reduce CPC by up to 50% vs QS of 5. A QS of 1 can increase CPC by 400%."

  components:
    - component: "Expected CTR"
      weight: "~39%"
      values: ["Above average", "Average", "Below average"]
      description: >
        Google's prediction of how likely your ad is to be clicked
        for this keyword, normalized for ad position and extensions.
      improvement:
        - "Write more compelling, relevant ad copy"
        - "Include the keyword in headlines"
        - "Use strong CTAs"
        - "Test different RSA headline combinations"
    - component: "Ad Relevance"
      weight: "~22%"
      values: ["Above average", "Average", "Below average"]
      description: >
        How closely your ad copy matches the intent of the keyword.
        Google looks for the keyword (or close meaning) in your ad text.
      improvement:
        - "Include target keyword in at least 2 headlines"
        - "Ensure ad group themes are tightly focused"
        - "Avoid mixing unrelated keywords in same ad group"
    - component: "Landing Page Experience"
      weight: "~39%"
      values: ["Above average", "Average", "Below average"]
      description: >
        How relevant, useful, and easy-to-navigate your landing page
        is for someone who clicked the ad.
      factors:
        - "Page relevance to keyword and ad copy"
        - "Page load speed (Core Web Vitals)"
        - "Mobile-friendliness"
        - "Original and useful content"
        - "Easy navigation and clear CTA"
        - "Trust signals (SSL, privacy policy)"
        - "Low bounce rate / high engagement"
      improvement:
        - "Ensure landing page content matches ad and keyword intent"
        - "Improve page speed (target LCP < 2.5s)"
        - "Make page mobile-responsive"
        - "Include clear CTAs above the fold"
        - "Add trust signals (reviews, certifications, security badges)"

  quality_score_scale:
    description: "Estimated impact on CPC relative to average (QS 5)"
    scale:
      1: {label: "Very poor", cpc_impact: "+400%", priority: "Pause or restructure immediately"}
      2: {label: "Poor", cpc_impact: "+150%", priority: "Urgent fix needed"}
      3: {label: "Poor", cpc_impact: "+67%", priority: "High priority fix"}
      4: {label: "Below average", cpc_impact: "+25%", priority: "Needs improvement"}
      5: {label: "Average", cpc_impact: "Baseline", priority: "Room for improvement"}
      6: {label: "Above average", cpc_impact: "-17%", priority: "Acceptable"}
      7: {label: "Good", cpc_impact: "-29%", priority: "Good standing"}
      8: {label: "Very good", cpc_impact: "-38%", priority: "Strong performance"}
      9: {label: "Excellent", cpc_impact: "-44%", priority: "Top tier"}
      10: {label: "Best", cpc_impact: "-50%", priority: "Optimal"}

  historical_quality_score:
    description: >
      Historical QS is available in Google Ads by adding 'Quality Score (hist.)',
      'Exp. CTR (hist.)', 'Ad relevance (hist.)', 'Landing page exp. (hist.)'
      columns. This shows QS at the time impressions were received, enabling
      trend analysis.
    csv_fields:
      - "Quality Score (hist.)"
      - "Exp. CTR (hist.)"
      - "Ad relevance (hist.)"
      - "Landing page exp. (hist.)"
    usage: "Segment by day or week to track QS trends over time"

  audit_checks:
    - id: "qs_001"
      name: "Keywords with Quality Score 1-3"
      description: "Severely underperforming keywords paying massive CPC premium"
      detection: "Filter keyword report: Quality Score <= 3"
      severity: "critical"
      recommendation: "Pause, restructure into tighter ad groups with relevant ads, or improve landing page"
    - id: "qs_002"
      name: "Below average Landing Page Experience"
      description: "Landing pages not meeting user expectations"
      detection: "Filter keyword report: Landing page exp. = Below average"
      severity: "high"
      recommendation: "Audit landing page speed, relevance, mobile-friendliness, and content quality"
    - id: "qs_003"
      name: "Below average Expected CTR"
      description: "Ads not compelling enough to drive clicks"
      detection: "Filter keyword report: Exp. CTR = Below average"
      severity: "high"
    - id: "qs_004"
      name: "Below average Ad Relevance"
      description: "Keyword-to-ad message mismatch"
      detection: "Filter keyword report: Ad relevance = Below average"
      severity: "medium"
    - id: "qs_005"
      name: "Quality Score declining over time"
      description: "Historical QS trending downward indicates degrading performance"
      detection: "Compare Quality Score (hist.) segmented by month"
      severity: "high"
    - id: "qs_006"
      name: "High-spend keywords with low QS"
      description: "Keywords accounting for >10% of spend with QS <= 5"
      detection: "Filter: Cost > 10% of total AND Quality Score <= 5"
      severity: "critical"
      formula: "wasted_premium = cost * (1 - (5/actual_QS)) — estimates CPC premium paid due to low QS"

