        ctr: 4.28
      local_services:
        cpc_range: [7.85, 15.00]
        ctr_range: [5.50, 6.37]
        cvr_range: [7.33, 15.0]
        cpl: 90.92
      healthcare:
        cpc_min: 40
        ctr: 4.90
        cvr: 3.10
      legal:
        cpc_range: [8.58, 9.21]
        ctr_range: [5.20, 5.97]
        cvr_range: [4.60, 5.09]
      finance:
        cpc_range: [3.46, 3.77]
        ctr_range: [4.65, 8.33]
        cvr_range: [2.55, 3.50]

    landing_page:
