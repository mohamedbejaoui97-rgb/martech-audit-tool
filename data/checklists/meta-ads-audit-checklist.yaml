  # --------------------------------------------------------------------------
  quality_gates:
    rules:
      - id: "MQG-01"
        name: "3x Kill Rule"
        description: "CPA >3x target → segnalare per pausa"
        severity: "critical"
      - id: "MQG-02"
        name: "Creative fatigue kill"
        description: "CTR drop >20% + frequency >5 → kill creative"
        severity: "critical"
      - id: "MQG-03"
        name: "Learning phase protection"
        description: "Non modificare ad set durante learning (nessun cambio budget >20%)"
        severity: "high"
      - id: "MQG-04"
        name: "Zero conversion spend"
        description: "Spesa ≥$100 o ≥50 click senza conversioni → segnalare per pausa"
        severity: "critical"

