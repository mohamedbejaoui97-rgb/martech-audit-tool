reporting_and_diagnostics:

  description: >
    Evaluates the use of Ads Manager reporting features, column configuration,
    breakdown dimensions, delivery insights, and ad relevance diagnostics.

  key_ads_manager_columns:
    performance:
      - "Results"
      - "Cost per Result"
      - "Amount Spent"
      - "Impressions"
      - "Reach"
      - "Frequency"
      - "CPM (Cost per 1,000 Impressions)"

    clicks:
      - "Link Clicks"
      - "CTR (Link Click-Through Rate)"
      - "CPC (Cost per Link Click)"
      - "Unique Link Clicks"
      - "Outbound Clicks"
      - "Landing Page Views"
      - "Cost per Landing Page View"

    conversions:
      - "Purchases"
      - "Purchase ROAS"
      - "Purchase Conversion Value"
      - "Cost per Purchase"
      - "Add to Cart"
      - "Cost per Add to Cart"
      - "Initiate Checkout"
      - "Leads"
      - "Cost per Lead"
      - "Complete Registrations"

    engagement:
      - "Post Engagement"
      - "Post Reactions"
      - "Post Comments"
      - "Post Shares"
      - "Post Saves"
      - "Video Views (3-second, ThruPlay)"
      - "Video Average Play Time"

    delivery:
      - "Delivery (Active, Inactive, Learning, Learning Limited, Error)"
      - "Bid Strategy"
      - "Budget"
      - "Schedule"
      - "Attribution Setting"

  breakdown_dimensions:
    by_delivery:
      - "Age"
      - "Gender"
      - "Age and Gender"
      - "Country"
      - "Region"
      - "Placement"
      - "Platform (Facebook, Instagram, Messenger, Audience Network)"
      - "Device (Mobile, Desktop)"
      - "Time of Day"

    by_action:
      - "Conversion Device"
      - "Carousel Card"
      - "Destination"
      - "Video View Type"
      - "Video Sound"

    by_time:
      - "Day"
      - "Week"
      - "2 Weeks"
      - "Month"

  ad_relevance_diagnostics:
    description: >
      Meta provides three diagnostic metrics for ads with 500+ impressions.
      These compare your ad against others targeting the same audience.

    metrics:
      - metric: "Quality Ranking"
        description: "Perceived quality compared to competing ads (same audience)"
        values: ["Below Average", "Average (35th-55th percentile)", "Above Average"]
        affected_by: "Ad creative quality, user feedback (hides, reports), post-click experience"

      - metric: "Engagement Rate Ranking"
        description: "Expected engagement rate compared to competing ads"
        values: ["Below Average", "Average (35th-55th percentile)", "Above Average"]
        affected_by: "Creative appeal, relevance to audience, ad format"

      - metric: "Conversion Rate Ranking"
        description: "Expected conversion rate compared to competing ads (same optimization goal)"
        values: ["Below Average", "Average (35th-55th percentile)", "Above Average"]
        affected_by: "Landing page experience, offer quality, funnel alignment"

    interpretation:
      all_below_average: "Complete ad overhaul needed — creative, targeting, and landing page"
      low_quality_only: "Improve creative quality, reduce clickbait, fix landing page"
      low_engagement_only: "Make creative more compelling, test new formats, improve hook"
      low_conversion_only: "Fix landing page, improve offer, check funnel for friction"
      priority: "Focus on improving 'Below Average' rankings — moving from low to average has more impact than average to above average"

    audit_checks:
      - id: "RD-001"
        check: "Ad Relevance Diagnostics are monitored for active ads"
        severity: "medium"
        how_to_verify: >
          Add Quality Ranking, Engagement Rate Ranking, and Conversion Rate
          Ranking columns to Ads Manager view. Review for ads with 500+ impressions.
        red_flag: "Multiple ads with 'Below Average' on all three rankings"

  account_quality:
    description: >
      Account Quality dashboard shows policy violations, ad rejections,
      and account health. Poor account quality can limit delivery.
    how_to_access: "Business Manager > Account Quality (left menu)"
    audit_checks:
      - id: "RD-010"
        check: "No active policy violations or restrictions"
        severity: "critical"
        red_flag: "Account restrictions, ad rejections, or policy strikes"

  opportunity_score:
    description: >
      New in 2025-2026: Meta's Opportunity Score rates your account 0-100
      based on how well you're following Meta's recommended practices.
    how_to_access: "Ads Manager > Opportunity Score (if available)"
    threshold: "Score below 50 indicates significant optimization opportunities"

# ============================================================================
# SECTION 13: COMMON MISTAKES & RED FLAGS
# ============================================================================

common_mistakes_and_red_flags:

  description: >
    Critical issues frequently found during Meta Ads audits. These are
    the highest-impact problems to identify and fix.

  tracking_red_flags:
    - id: "RF-001"
      issue: "No Conversions API (CAPI) implemented"
      severity: "critical"
      impact: >
        15-30% conversion underreporting from iOS users, reduced ad
        optimization, higher CPAs. CAPI is no longer optional in 2025-2026.
      fix: "Implement CAPI via partner integration, GTM server-side, or direct API"

    - id: "RF-002"
      issue: "Low Event Match Quality (EMQ) score (<6)"
      severity: "critical"
      impact: "Poor event-to-user matching, degraded optimization, inflated CPAs"
      fix: "Send additional customer information parameters (em, ph, fbc, fbp, external_id)"

    - id: "RF-003"
      issue: "No event deduplication between Pixel and CAPI"
      severity: "critical"
      impact: "Conversions counted twice, inflated ROAS, incorrect optimization signals"
      fix: "Implement event_id on both Pixel and CAPI events for same actions"

    - id: "RF-004"
      issue: "Purchase event missing value/currency parameters"
      severity: "critical"
      impact: "Cannot use ROAS bidding, no revenue reporting, broken value optimization"
      fix: "Add value (decimal) and currency (ISO 4217 code) to all Purchase events"

  audience_red_flags:
    - id: "RF-010"
      issue: "High audience overlap between ad sets (>30%)"
      severity: "high"
      impact: "Self-competition in auctions, increased costs, inconsistent delivery"
      fix: "Consolidate overlapping ad sets or use exclusions"

    - id: "RF-011"
      issue: "No audience exclusions on prospecting campaigns"
      severity: "high"
      impact: "Budget wasted re-acquiring existing customers"
      fix: "Exclude purchasers/converters Custom Audience from prospecting"

    - id: "RF-012"
      issue: "Over-segmentation — too many small ad sets"
      severity: "high"
      impact: >
        Ad sets starved of budget, stuck in learning phase, poor optimization.
        Each ad set needs ~50 conversions/week to optimize properly.
      fix: "Consolidate into fewer, larger ad sets with broader targeting"

    - id: "RF-013"
      issue: "No broad/Advantage+ targeting tested"
      severity: "medium"
      impact: "Potentially missing better performance from algorithmic targeting"
      fix: "Test Advantage+ Audience alongside manual targeting"

  creative_red_flags:
    - id: "RF-020"
      issue: "Creative fatigue — high frequency + declining CTR/rising CPA"
      severity: "high"
      impact: "Wasted spend, declining performance, audience burnout"
      fix: "Refresh creative every 10-14 days or when frequency exceeds 3 (prospecting)"

    - id: "RF-021"
      issue: "No creative testing in place"
      severity: "high"
      impact: "No pipeline of fresh creative, performance decline over time"
      fix: "Establish testing campaign with regular new creative additions (3-6 variants)"

    - id: "RF-022"
      issue: "Only one ad format used (e.g., only static images)"
      severity: "medium"
      impact: "Missing placements that favor video (Reels, Stories), limited engagement"
      fix: "Test video, carousel, and collection formats alongside images"

    - id: "RF-023"
      issue: "No vertical (9:16) creative for Stories/Reels"
      severity: "medium"
      impact: "Poor performance in fastest-growing placements"
      fix: "Create 9:16 assets for Stories and Reels placements"

  optimization_red_flags:
    - id: "RF-030"
      issue: "Wrong attribution window — comparing unlike data across platforms"
      severity: "high"
      impact: "Misleading ROAS/CPA comparisons, incorrect budget allocation"
      fix: "Standardize attribution windows and understand view-through vs click-through"

    - id: "RF-031"
      issue: "Frequent learning phase resets from aggressive changes"
      severity: "high"
      impact: "Algorithm never stabilizes, consistently higher CPAs"
      fix: "Follow 20% budget increase rule, batch changes, minimize edits"

    - id: "RF-032"
      issue: "Optimizing for wrong event in funnel"
      severity: "high"
      impact: "Attracting wrong user intent (e.g., optimizing for Landing Page Views when you want Purchases)"
      fix: "Optimize for the event closest to revenue that has sufficient volume (50+/week)"

    - id: "RF-033"
      issue: "No frequency cap on awareness/reach campaigns"
      severity: "medium"
      impact: "Budget waste on excessive impressions to same users"
      fix: "Set frequency cap (e.g., 2 impressions per week for awareness)"

    - id: "RF-034"
      issue: "CBO enabled but ad sets have very different audience sizes"
      severity: "medium"
      impact: "Budget skews to largest audience, smaller audiences get no delivery"
      fix: "Use similar-sized audiences with CBO, or switch to ABO for unequal audiences"

# ============================================================================
# SECTION 14: GDPR / CONSENT FOR META
# ============================================================================

gdpr_and_consent:

  description: >
    Evaluates GDPR compliance, consent management, and Meta's data processing
    requirements for EU/EEA users. Non-compliance risks fines, account
    restrictions, and data processing limitations.

  meta_consent_mode:
    description: >
      Meta Consent Mode is a privacy framework that gates Meta Pixel and
      CAPI data collection based on user consent status. When a user
      declines consent, the Pixel and CAPI should not fire tracking events
      or should fire in a limited/anonymized mode.

    implementation: >
      The CMP (Consent Management Platform) checks user consent before
      allowing the Meta Pixel to initialize. The fbq('consent', 'grant')
      and fbq('consent', 'revoke') functions control Pixel behavior based
      on consent status.

    functions:
      - "fbq('consent', 'revoke') — blocks Pixel before consent is given"
      - "fbq('consent', 'grant') — enables Pixel after consent is granted"

  limited_data_use:
    description: >
      Meta's Limited Data Use (LDU) flag restricts how Meta processes data
      for users in specific jurisdictions (California CCPA, and potentially
      other regions). When LDU is enabled, Meta limits data processing to
      essential operations only.

    implementation: >
      fbq('dataProcessingOptions', ['LDU'], 0, 0) — enables LDU with
      automatic geo-detection. Can also specify state (e.g., 1000 for
      California). For CAPI: include data_processing_options parameter.

  eu_requirements:
    - requirement: "Obtain explicit consent before firing Meta Pixel (GDPR Art. 6/7)"
      severity: "critical"
      notes: "Pixel must not fire until user actively consents to marketing cookies"

    - requirement: "Implement a TCF 2.2 compliant CMP"
      severity: "critical"
      notes: "Required for EU/EEA traffic. Meta supports IAB Transparency and Consent Framework"

    - requirement: "Record and store consent evidence"
      severity: "critical"
      notes: "Meta may request proof of consent. Store when, where, and how consent was obtained."

    - requirement: "Provide option for 'Less Personalized Ads'"
      severity: "high"
      notes: "Since January 2025, Meta requires EU users be offered choice between personalized and less personalized ads"

    - requirement: "CAPI events respect consent status"
      severity: "critical"
      notes: "Server-side events must also be gated by consent — do not send CAPI events for users who declined consent"

  cmp_integrations:
    description: >
      Consent Management Platforms that integrate with Meta Pixel/CAPI
      to automate consent-based firing.

    supported_cmps:
      - name: "Iubenda"
        integration: "Google-certified CMP, supports TCF 2.2, integrates with Meta Pixel via consent callback"
        notes: "Can block pixel until consent, then fire fbq('consent', 'grant')"

      - name: "Cookiebot (Cybot)"
        integration: "TCF 2.2, auto-blocks Meta Pixel scripts until consent"

      - name: "OneTrust"
        integration: "Enterprise CMP, TCF 2.2, Meta Pixel integration via tag categorization"

      - name: "CookieScript"
        integration: "Templates for Meta Pixel consent integration"

      - name: "Consentmo"
        integration: "Shopify-focused CMP with Meta Pixel consent support"

      - name: "Osano"
        integration: "CMP with Meta integration support"

  audit_checks:
    - id: "GDPR-001"
      check: "Meta Pixel does not fire before user consent (EU/EEA traffic)"
      severity: "critical"
      how_to_verify: >
        In an EU browser (or VPN), visit the site. Before accepting cookies,
        check Pixel Helper — it should show NO pixel activity. After consent,
        Pixel should initialize.
      red_flag: "Pixel fires on page load before any consent interaction"

    - id: "GDPR-002"
      check: "CMP is implemented and properly configured"
      severity: "critical"
      how_to_verify: "Cookie banner appears for EU traffic, offers granular consent choices"
      red_flag: "No cookie banner, or banner with only 'Accept' (no reject option)"

    - id: "GDPR-003"
      check: "CAPI events respect consent status"
      severity: "critical"
      how_to_verify: >
        Verify server-side implementation checks consent status before
        sending events to Meta API.
      red_flag: "CAPI events sent for all users regardless of consent"

    - id: "GDPR-004"
      check: "Limited Data Use is configured for applicable jurisdictions"
      severity: "high"
      how_to_verify: "Check pixel code or GTM for dataProcessingOptions implementation"
      red_flag: "CCPA-applicable traffic with no LDU flag"

    - id: "GDPR-005"
      check: "Consent records are maintained and auditable"
      severity: "high"
      notes: "Meta's 2025 policy requires advertisers to provide evidence of consent upon request"

# ============================================================================
# SECTION 15: 2025-2026 META ADS CHANGES
# ============================================================================

meta_ads_changes_2025_2026:

  description: >
    Key platform changes and new features that affect how Meta Ads accounts
    should be set up and managed. Auditors should verify accounts have
    adapted to these changes.

  advantage_plus_expansion:
    changes:
      - change: "Advantage+ is now the default for Sales, Leads, and App Promotion objectives"
        date: "Early 2026"
        impact: "Old campaign structures automatically use Advantage+ settings"
        audit_action: "Verify advertisers understand which Advantage+ features are active"

      - change: "Advantage+ Shopping renamed to Advantage+ Sales"
        date: "2025"
        impact: "Same functionality, new name; also available for non-shopping Sales campaigns"

      - change: "Existing Customer Budget Cap removed from ASC"
        date: "2025"
        impact: "Must use audience exclusions or separate ad sets to control new vs existing customer spend"
        audit_action: "Check if existing customer controls are properly configured"

      - change: "Advantage+ Audience replaces interest/behavior targeting as default"
        date: "2025-2026"
        impact: "Manual audience selections become 'suggestions' not restrictions"

  threads_advertising:
    changes:
      - change: "Threads Feed placement available for ads"
        date: "2025"
        impact: "New placement option — 400M+ users by early 2026"
        formats: ["Static image", "Carousel", "Video"]
        notes: "Text-first environment; ads should feel native to conversations"

  ai_creative_tools:
    changes:
      - change: "Image-to-Video AI tool"
