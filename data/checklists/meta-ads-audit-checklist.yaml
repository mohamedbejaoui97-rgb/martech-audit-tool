        fail: "Eventi custom che rimpiazzano standard"

      - id: "M08"
        name: "CAPI Gateway"
        severity: "medium"
        pass: "CAPI Gateway deployato per server-side semplificato"
        warning: "Integrazione CAPI diretta attiva"

      - id: "M09"
        name: "iOS Attribution Window"
        severity: "high"
