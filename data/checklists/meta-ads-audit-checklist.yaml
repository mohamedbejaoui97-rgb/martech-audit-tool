# ============================================================================
# SECTION 11: CATALOG / PRODUCT FEED AUDIT
# ============================================================================

catalog_product_feed:

  description: >
    Evaluates the Meta Commerce Manager catalog setup and product feed
    quality for dynamic ads (Advantage+ Catalog Ads). A well-optimized
    feed is essential for dynamic ad performance.

  required_fields:
    - field: "id"
      description: "Unique product identifier"
      type: "string"
      notes: "Must match content_ids sent by pixel/CAPI events"

    - field: "title"
      description: "Product name"
      type: "string"
      max_length: "200 characters"
      best_practice: "Include key attributes (brand, product type, color, size)"

    - field: "description"
      description: "Product description"
      type: "string"
      max_length: "9999 characters"

    - field: "availability"
      description: "Product availability"
      type: "string"
      values: ["in stock", "out of stock", "preorder", "available for order", "discontinued"]

    - field: "condition"
      description: "Product condition"
      type: "string"
      values: ["new", "refurbished", "used"]

    - field: "price"
      description: "Product price with currency"
      type: "string"
      format: "100.00 USD"
      notes: "Must include currency ISO code"

    - field: "link"
      description: "Product page URL"
      type: "string"
      notes: "Must be a valid, accessible URL"

    - field: "image_link"
      description: "Main product image URL"
      type: "string"
      min_resolution: "500x500 pixels"
      recommended_resolution: "1024x1024 pixels or higher"
      notes: "White background recommended, no watermarks, no promotional text"

    - field: "brand"
      description: "Product brand name"
      type: "string"
      notes: "Required if no GTIN or MPN. At least one of brand/GTIN/MPN is required."

  recommended_fields:
    - field: "sale_price"
      description: "Discounted price (if on sale)"
    - field: "gtin"
      description: "Global Trade Item Number (UPC, EAN, ISBN)"
    - field: "mpn"
      description: "Manufacturer Part Number"
    - field: "google_product_category"
      description: "Google product taxonomy category"
    - field: "product_type"
      description: "Your own product categorization"
    - field: "additional_image_link"
      description: "Additional product images (up to 10)"
    - field: "color"
      description: "Product color"
    - field: "size"
      description: "Product size"
    - field: "gender"
      description: "Target gender"
    - field: "age_group"
      description: "Target age group"
    - field: "material"
      description: "Product material"
    - field: "pattern"
      description: "Product pattern"
    - field: "custom_label_0 through custom_label_4"
      description: "Custom labels for campaign segmentation (e.g., margin tier, bestseller, seasonal)"

  feed_formats:
    - "CSV"
    - "TSV"
    - "XML (RSS/ATOM)"
    - "Google Sheets"
    - "XLSX"

  dynamic_media_2025_update: >
    As of October 2025, Meta enforces Dynamic Media by default for all new
    Advantage+ Catalog ads. This adds automatic creative enhancements
    (overlays, effects) to catalog product images unless explicitly disabled.

  audit_checks:
    - id: "CAT-001"
      check: "Product catalog is connected and active in Commerce Manager"
      severity: "critical"
      how_to_verify: "Commerce Manager > Catalog > check status and item count"

    - id: "CAT-002"
      check: "All required fields are populated and valid"
      severity: "critical"
      how_to_verify: "Commerce Manager > Diagnostics tab > check for errors and warnings"
      red_flag: "Errors preventing items from appearing in ads"

    - id: "CAT-003"
      check: "Product IDs in feed match content_ids from Pixel/CAPI events"
      severity: "critical"
      how_to_verify: >
        Compare 'id' field in catalog export with content_ids parameter
        in Events Manager pixel events.
      red_flag: "ID mismatch means dynamic ads show wrong products or no products"

    - id: "CAT-004"
      check: "Product images meet quality standards"
      severity: "high"
      threshold: "Minimum 500x500px, recommended 1024x1024px"
      red_flag: "Low-resolution images, watermarks, promotional text overlays, inconsistent backgrounds"

    - id: "CAT-005"
      check: "Feed is updated regularly"
      severity: "high"
      best_practice: "Daily feed updates for price and availability accuracy"
      red_flag: "Feed last updated weeks ago — out-of-stock products being advertised"

    - id: "CAT-006"
      check: "At least one of brand, GTIN, or MPN is populated for each product"
      severity: "high"
      red_flag: "Products missing all three identifiers will be rejected"

    - id: "CAT-007"
      check: "Custom labels are used for campaign segmentation"
      severity: "medium"
      examples: ["custom_label_0: margin tier (high/medium/low)", "custom_label_1: bestseller (yes/no)", "custom_label_2: seasonal (spring/summer/etc.)"]
      use_case: "Enables product set creation for targeted catalog campaigns"

