  # ACCOUNT STRUCTURE (20% weight, 18 checks)
  # --------------------------------------------------------------------------
  account_structure_checks:
    weight: 0.20
    description: "Struttura campagne, learning phase, Advantage+, bidding"

    checks:
      - id: "M11"
        name: "Campaign count"
        severity: "high"
        pass: "≤5 campagne attive per paese/stadio funnel"
        warning: "6-8 campagne per segmento"
        fail: ">8 campagne (over-fragmented)"

      - id: "M12"
        name: "CBO vs ABO appropriateness"
        severity: "high"
        pass: "CBO per >$500/day; ABO per testing <$100/day"
        warning: "Mismatch ma funzionale"
        fail: "CBO su <$100/day O ABO su >$500/day"

      - id: "M13"
        name: "Learning phase status"
        severity: "critical"
        pass: "<30% ad set in 'Learning Limited'"
        warning: "30-50% Learning Limited"
        fail: ">50% ad set 'Learning Limited'"
        exit_criteria: "50 conversioni per settimana per ad set"

      - id: "M14"
        name: "Learning phase resets"
        severity: "high"
        pass: "Nessun edit non necessario durante learning phase"
        warning: "1-2 reset minori"
