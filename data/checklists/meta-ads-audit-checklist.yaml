audit_checks:

  # --------------------------------------------------------------------------
  # PIXEL / CAPI HEALTH (30% weight, 10 checks)
  # --------------------------------------------------------------------------
  pixel_capi_health_checks:
    weight: 0.30
    description: "Fondazione tracking — Pixel + CAPI + deduplicazione + EMQ"

    checks:
      - id: "M01"
        name: "Meta Pixel installato"
        severity: "critical"
        pass: "Pixel firing su tutte le pagine"
        warning: "Firing sulla maggior parte (>90%)"
        fail: "Pixel non firing"

      - id: "M02"
        name: "Conversions API (CAPI) attiva"
        severity: "critical"
        pass: "Eventi server-side inviati insieme al pixel"
        warning: "CAPI pianificata ma non deployata"
        fail: "Nessuna CAPI (30-40% data loss post-iOS 14.5)"
        impact: "87% advertisers hanno EMQ scarso; CAPI migliora performance 20-40%"
        quick_win: true
        fix_time: "15 min (via CAPI Gateway)"

      - id: "M03"
        name: "Event deduplication"
        severity: "critical"
        pass: "event_id matching tra pixel e CAPI; ≥90% dedup rate"
        warning: "event_id presente ma <90% dedup rate"
        fail: "event_id mancante (conteggio doppio)"

      - id: "M04"
        name: "Event Match Quality (EMQ)"
        severity: "critical"
        pass: "EMQ ≥8.0 per evento Purchase"
        warning: "EMQ 6.0-7.9"
        fail: "EMQ <6.0"
        emq_parameters:
          email: "+4.0 punti (match rate più alto)"
          phone: "+3.0 punti"
          first_name: "Migliora accuratezza"
          last_name: "Migliora accuratezza"
          external_id: "Cross-device matching"
          fbp: "Browser tracking"
          fbc: "Click tracking"

      - id: "M05"
        name: "Domain verification"
        severity: "high"
        pass: "Dominio verificato in Business Manager"
        fail: "Dominio non verificato"
        quick_win: true
        fix_time: "5 min"

      - id: "M06"
        name: "Aggregated Event Measurement (AEM)"
        severity: "high"
        pass: "Top 8 eventi configurati e prioritizzati correttamente"
        warning: "Eventi configurati ma non prioritizzati"
        fail: "AEM non configurato"

      - id: "M07"
        name: "Standard Events vs Custom"
        severity: "high"
        pass: "Uso di eventi standard (Purchase, AddToCart, Lead, ecc.)"
