  # --------------------------------------------------------------------------
  # SCORING ALGORITHM
  # --------------------------------------------------------------------------
  health_score_algorithm:
    formula: "S_total = Σ(C_pass × W_sev × W_cat) / Σ(C_total × W_sev × W_cat) × 100"
    pass_value: 1.0
    warning_value: 0.5
    fail_value: 0.0
    severity_multipliers:
      critical: 5.0
      high: 3.0
      medium: 1.5
      low: 0.5

