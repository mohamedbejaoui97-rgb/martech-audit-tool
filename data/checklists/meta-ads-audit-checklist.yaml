        reset_triggers: ["Cambio budget >20%", "Qualsiasi cambio targeting", "Edit creative (anche testo)", "Cambio bid strategy", "Pausa >7 giorni"]

      - id: "M15"
        name: "Advantage+ Sales Campaign"
        severity: "medium"
        pass: "ASC attivo per ecommerce con catalogo"
        warning: "ASC testato ma in pausa"
        fail: "Non testato nonostante catalogo idoneo"
        benchmark: "ROAS ASC 4.52:1 vs 2.19:1 standard"

      - id: "M16"
        name: "Ad set consolidation"
        severity: "high"
        pass: "Nessun ad set overlapping che targettizza la stessa audience"
