# ============================================================================
# SCORING FRAMEWORK
# ============================================================================

scoring:
  description: >
    Each audit check has a severity that maps to point weights. The overall
    audit score is calculated as a percentage of maximum possible points.

  severity_weights:
    critical: 10
    high: 5
    medium: 3
    low: 1

  grade_thresholds:
    A: "90-100%"
    B: "75-89%"
    C: "60-74%"
    D: "40-59%"
    F: "0-39%"

  scoring_formula: >
    Score = (sum of passed check weights / sum of all applicable check weights) x 100.
    Non-applicable checks (e.g., catalog checks for non-ecommerce) are excluded

