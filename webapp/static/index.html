<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarTech Audit Tool</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e4e6f0;
  --text-muted: #8b8fa3;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --success: #22c55e;
  --warning: #eab308;
  --error: #ef4444;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
h2 { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
h3 { font-size: 17px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); }
.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
.screen { display: none; }
.screen.active { display: block; }

/* ─── Cards / Forms ─── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
}
label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-muted); }
input[type="text"], input[type="number"], input[type="url"], select, textarea {
  width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 80px; }
.form-row { margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ─── Radio / Checkbox groups ─── */
.option-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
.option-group label {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; font-size: 14px; color: var(--text); transition: all 0.2s;
}
.option-group label:hover { border-color: var(--accent); }
.option-group input:checked + span { color: var(--accent); }
.option-group input { accent-color: var(--accent); }

/* ─── Buttons ─── */
.btn {
  padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

/* ─── Tabs ─── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; background: var(--surface2); color: var(--text-muted);
  border: 1px solid transparent; transition: all 0.2s;
}
.tab.active { background: var(--accent); color: white; }
.tab.done { border-color: var(--success); color: var(--success); }
.tab.skipped { border-color: var(--text-muted); opacity: 0.5; }
.wizard-panel { display: none; }
.wizard-panel.active { display: block; }

/* ─── Drag & Drop ─── */
.dropzone {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px;
  text-align: center; color: var(--text-muted); cursor: pointer; transition: all 0.2s;
}
.dropzone:hover, .dropzone.dragover { border-color: var(--accent); color: var(--accent); }
.dropzone input { display: none; }
.file-list { margin-top: 10px; font-size: 13px; }
.file-item { padding: 4px 0; color: var(--success); }

/* ─── Progress ─── */
.progress-step {
  display: flex; align-items: center; gap: 14px; padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.progress-step:last-child { border-bottom: none; }
.step-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 14px; flex-shrink: 0; }
.step-icon.pending { background: var(--surface2); color: var(--text-muted); }
.step-icon.running { background: var(--accent); color: white; animation: pulse 1.5s infinite; }
.step-icon.done { background: var(--success); color: white; }
.step-icon.error { background: var(--error); color: white; }
.step-icon.skipped { background: var(--surface2); color: var(--text-muted); }
.step-detail { font-size: 13px; color: var(--text-muted); }
.step-name { font-weight: 600; font-size: 14px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 6px; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* ─── Results ─── */
.score-hero {
  text-align: center; padding: 40px; background: var(--surface);
  border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px;
}
.score-value { font-size: 72px; font-weight: 800; line-height: 1; }
.score-grade { font-size: 28px; font-weight: 700; margin-top: 8px; }
.score-label { color: var(--text-muted); margin-top: 8px; font-size: 14px; }
.pillar-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.pillar-label { width: 140px; font-size: 13px; font-weight: 600; text-align: right; }
.pillar-track { flex: 1; height: 20px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
.pillar-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
.pillar-value { width: 40px; font-size: 13px; font-weight: 700; }
.leverage-node { display: inline-block; padding: 6px 14px; margin: 4px; border-radius: 20px; font-size: 13px; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); }
.l2-badge { display: inline-block; padding: 3px 10px; margin: 3px; border-radius: 12px; font-size: 11px; font-weight: 600; background: rgba(34,197,94,0.15); color: var(--success); }
.error-box { text-align: center; padding: 40px; }
.error-box h3 { color: var(--error); margin-bottom: 12px; }
.gap-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.gap-table th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
.gap-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }

/* ─── Dynamic conversions ─── */
#gads-conversions-list .conv-row {
  background: var(--surface2); border-radius: 8px; padding: 16px; margin-bottom: 12px;
}
.conv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.remove-conv { background: none; border: none; color: var(--error); cursor: pointer; font-size: 18px; }

/* ─── Header ─── */
header { padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.logo { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }

/* ─── Stepper ─── */
.stepper { display: flex; align-items: center; gap: 0; margin-bottom: 32px; }
.stepper-item {
  flex: 1; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted);
  padding-bottom: 12px; border-bottom: 3px solid var(--border); transition: all 0.2s;
}
.stepper-item.active { color: var(--accent); border-color: var(--accent); }
.stepper-item.completed { color: var(--success); border-color: var(--success); }
</style>
</head>
<body>
<div class="container">
<header><div class="logo">Mar<span>Tech</span> Audit Tool</div></header>

<!-- Stepper -->
<div class="stepper">
  <div class="stepper-item active" data-step="1">1. Configurazione</div>
  <div class="stepper-item" data-step="2">2. Wizard</div>
  <div class="stepper-item" data-step="3">3. Esecuzione</div>
  <div class="stepper-item" data-step="4">4. Risultati</div>
</div>

<!-- ════════════════════ SCREEN 1: CONFIG ════════════════════ -->
<div class="screen active" id="screen-config">
  <h2>Configurazione Audit</h2>
  <div class="card">
    <div class="form-grid">
      <div class="form-row">
        <label>URL Dominio</label>
        <input type="url" id="cfg-url" placeholder="https://example.com" value="https://">
      </div>
      <div class="form-row">
        <label>Nome Cliente</label>
        <input type="text" id="cfg-client" placeholder="Acme Corp">
      </div>
    </div>
    <div class="form-row">
      <label>Tipo Business</label>
      <div class="option-group" id="cfg-btype"></div>
    </div>
    <div class="form-row">
      <label>Piattaforme da auditare</label>
      <div class="option-group" id="cfg-platforms"></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="goToWizards()">Avvia Wizard &rarr;</button>
  </div>
</div>

<!-- ════════════════════ SCREEN 2: WIZARDS ════════════════════ -->
<div class="screen" id="screen-wizards">
  <h2>Wizard Piattaforme</h2>
  <div class="tabs" id="wizard-tabs"></div>
  <div id="wizard-panels"></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="goToScreen(1)">&#8592; Indietro</button>
    <button class="btn btn-primary" id="btn-start-audit" onclick="startAudit()" disabled title="Completa o salta tutti i wizard">Avvia Audit &rarr;</button>
  </div>
</div>

<!-- ════════════════════ SCREEN 3: PROGRESS ════════════════════ -->
<div class="screen" id="screen-progress">
  <h2>Audit in corso...</h2>
  <div class="card" id="progress-list"></div>
</div>

<!-- ════════════════════ SCREEN 4: RESULTS ════════════════════ -->
<div class="screen" id="screen-results">
  <h2>Risultati Audit</h2>
  <div id="results-content"></div>
</div>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
let CONST = {};
let wizardData = {};
let sessionId = null;
let wizardStatus = {};  // {platform: 'pending'|'done'|'skipped'}
let activePlatforms = [];

// ─── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('/api/constants');
  CONST = await res.json();
  renderConfig();
}

function renderConfig() {
  // Business types
  const btEl = document.getElementById('cfg-btype');
  btEl.innerHTML = CONST.business_types.map((t, i) =>
    `<label><input type="radio" name="btype" value="${t}" ${i===0?'checked':''}><span>${t}</span></label>`
  ).join('');

  // Platforms
  const plEl = document.getElementById('cfg-platforms');
  plEl.innerHTML = CONST.platforms.map((p, i) => {
    const key = CONST.platform_keys[i];
    const desc = CONST.platform_descriptions[key] || '';
    return `<label title="${desc}"><input type="checkbox" name="platform" value="${key}" checked><span>${p}</span></label>`;
  }).join('');
}

// ─── Navigation ────────────────────────────────────────────────────────────
function goToScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(['','screen-config','screen-wizards','screen-progress','screen-results'][n]).classList.add('active');
  document.querySelectorAll('.stepper-item').forEach(s => {
    const step = parseInt(s.dataset.step);
    s.classList.toggle('active', step === n);
    s.classList.toggle('completed', step < n);
  });
}

function getConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const client = document.getElementById('cfg-client').value.trim();
  const btype = document.querySelector('input[name="btype"]:checked')?.value || 'Ecommerce';
  const btypeMap = {'Ecommerce':'ecommerce','Lead Generation':'lead_gen','Entrambi':'both'};
  const platforms = [...document.querySelectorAll('input[name="platform"]:checked')].map(c => c.value);
  return {
    business_profile: { url, client_name: client, business_type: btypeMap[btype] || 'ecommerce', platforms }
  };
}

// ─── Wizard Rendering ──────────────────────────────────────────────────────
function goToWizards() {
  const cfg = getConfig();
  if (!cfg.business_profile.url || cfg.business_profile.url === 'https://') {
    alert('Inserisci un URL valido'); return;
  }
  if (cfg.business_profile.platforms.length === 0) {
    alert('Seleziona almeno una piattaforma'); return;
  }
  renderWizards(cfg);
  goToScreen(2);
}

function renderWizards(cfg) {
  const platforms = cfg.business_profile.platforms;
  activePlatforms = platforms;
  const btype = cfg.business_profile.business_type;
  const tabsEl = document.getElementById('wizard-tabs');
  const panelsEl = document.getElementById('wizard-panels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';
  wizardStatus = {};

  platforms.forEach((p, i) => {
    wizardStatus[p] = 'pending';

    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = CONST.platforms[CONST.platform_keys.indexOf(p)];
    tab.onclick = () => switchWizardTab(p);
    tab.dataset.platform = p;
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'wizard-panel' + (i === 0 ? ' active' : '');
    panel.id = `wizard-${p}`;
    panel.innerHTML = buildWizardForm(p, btype) +
      `<div class="btn-row" style="margin-top:16px">
        <button class="btn btn-secondary" onclick="skipWizard('${p}')">Salta</button>
        <button class="btn btn-primary" onclick="confirmWizard('${p}')">Conferma</button>
      </div>
      <div class="wizard-status-msg" id="ws-${p}" style="display:none;margin-top:12px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600"></div>`;
    panelsEl.appendChild(panel);
  });
  updateAuditButton();
}

function switchWizardTab(platform) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.platform === platform));
  document.querySelectorAll('.wizard-panel').forEach(p => p.classList.toggle('active', p.id === `wizard-${platform}`));
}

function buildWizardForm(platform, btype) {
  const c = CONST[platform] || {};
  switch(platform) {
    case 'iubenda': return buildIubendaForm(c);
    case 'gtm': return buildGtmForm(c, btype);
    case 'gads': return buildGadsForm(c, btype);
    case 'meta': return buildMetaForm(c, btype);
    case 'gsc': return buildGscForm(c);
    default: return '<div class="card">Wizard non disponibile</div>';
  }
}

function buildIubendaForm(c) {
  return `<div class="card">
    <h3>Iubenda — Consent & Privacy</h3>
    <div class="form-grid">
      <div class="form-row">
        <label>Rejection Rate (%)</label>
        <input type="number" id="iub-rejection" min="0" max="100" step="0.1" placeholder="es. 32.5">
      </div>
      <div class="form-row">
        <label>Consent Mode</label>
        <select id="iub-consent-mode">
          ${c.consent_mode_options.map(o => `<option>${o}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Servizi nel banner</label>
      <div class="option-group">
        ${c.banner_services.map(s => `<label><input type="checkbox" name="iub-services" value="${s}"><span>${s}</span></label>`).join('')}
      </div>
    </div>
    <div class="form-row">
      <label>Anomalie rilevate</label>
      <textarea id="iub-anomalies" placeholder="Anomalie riscontrate durante l'analisi..."></textarea>
    </div>
    <div class="form-row">
      <label>Note operatore</label>
      <textarea id="iub-notes" placeholder="Osservazioni aggiuntive..."></textarea>
    </div>
    ${evidenceDropzone('iubenda')}
  </div>`;
}

function buildGtmForm(c, btype) {
  const events = btype === 'lead_gen' ? c.lead_gen_events : c.ecommerce_events;
  return `<div class="card">
    <h3>GTM — Implementation Quality</h3>
    <div class="form-row">
      <label>Il cliente usa GTM?</label>
      <div class="option-group">
        <label><input type="radio" name="gtm-uses" value="si" checked><span>Si</span></label>
        <label><input type="radio" name="gtm-uses" value="no"><span>No</span></label>
        <label><input type="radio" name="gtm-uses" value="parziale"><span>Parzialmente</span></label>
      </div>
    </div>
    <div class="form-row">
      <label>Upload GTM Container JSON</label>
      <div class="dropzone" id="gtm-dropzone" onclick="document.getElementById('gtm-file').click()">
        Trascina il file JSON qui o clicca per selezionare
        <input type="file" id="gtm-file" accept=".json" onchange="handleGtmUpload(this)">
      </div>
      <div class="file-list" id="gtm-file-info"></div>
    </div>
    <div class="form-row">
      <label>Anomalie rilevate</label>
      <textarea id="gtm-anomalies" placeholder="Anomalie riscontrate durante l'analisi..."></textarea>
    </div>
    <div class="form-row">
      <label>Note operatore</label>
      <textarea id="gtm-notes" placeholder="Osservazioni aggiuntive..."></textarea>
    </div>
    ${evidenceDropzone('gtm')}
  </div>`;
}

function buildGadsForm(c, btype) {
  return `<div class="card">
    <h3>Google Ads — Conversion Reliability</h3>
    <div class="form-row">
      <label>Conversioni attive?</label>
      <div class="option-group">
        <label><input type="radio" name="gads-active" value="si" checked><span>Si</span></label>
        <label><input type="radio" name="gads-active" value="no"><span>No</span></label>
        <label><input type="radio" name="gads-active" value="alcune"><span>Alcune</span></label>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Consent Mode Diagnostics</label>
        <select id="gads-cm-diag">${c.consent_mode_diag_options.map(o => `<option>${o}</option>`).join('')}</select>
      </div>
      <div class="form-row">
        <label>Enhanced Conversions Diagnostics</label>
        <select id="gads-ec-diag">${c.enhanced_conv_diag_options.map(o => `<option>${o}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row">
      <label>Attribution Model</label>
      <select id="gads-attribution">${c.attribution_model_options.map(o => `<option>${o}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <label>Conversion Actions</label>
      <div id="gads-conversions-list"></div>
      <button class="btn btn-secondary" style="margin-top:8px" onclick="addConversion()">+ Aggiungi Conversione</button>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Giorni inattività</label>
        <input type="number" id="gads-inactive-days" min="0" placeholder="es. 14">
      </div>
      <div class="form-row" style="display:flex;align-items:end">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="gads-ga4-gap" style="width:auto;accent-color:var(--error)">
          <span style="color:var(--error);font-size:13px;font-weight:600">GA4 Gap Critico</span>
        </label>
      </div>
    </div>
    <div class="form-row">
      <label>Anomalie rilevate</label>
      <textarea id="gads-anomalies" placeholder="Anomalie riscontrate durante l'analisi..."></textarea>
    </div>
    <div class="form-row">
      <label>Note operatore</label>
      <textarea id="gads-notes" placeholder="Osservazioni aggiuntive..."></textarea>
    </div>
    ${evidenceDropzone('gads')}
  </div>`;
}

function addConversion() {
  const list = document.getElementById('gads-conversions-list');
  const idx = list.children.length;
  const c = CONST.gads;
  const row = document.createElement('div');
  row.className = 'conv-row';
  row.innerHTML = `
    <div class="conv-header"><strong>Conversione #${idx+1}</strong><button class="remove-conv" onclick="this.closest('.conv-row').remove()">&times;</button></div>
    <div class="form-grid">
      <div class="form-row"><label>Nome</label><input type="text" class="conv-name" placeholder="es. Purchase"></div>
      <div class="form-row"><label>Source</label><select class="conv-source">${c.conversion_sources.map(o=>`<option>${o}</option>`).join('')}</select></div>
      <div class="form-row"><label>Counting</label><select class="conv-counting">${c.conversion_counting.map(o=>`<option>${o}</option>`).join('')}</select></div>
      <div class="form-row"><label>Status</label><select class="conv-status">${c.conversion_status_options.map(o=>`<option>${o}</option>`).join('')}</select></div>
    </div>`;
  list.appendChild(row);
}

function buildMetaForm(c, btype) {
  const events = btype === 'lead_gen' ? c.lead_gen_events : c.ecommerce_events;
  return `<div class="card">
    <h3>Meta — Event Match Quality</h3>
    <div class="form-grid">
      <div class="form-row"><label>Pixel ID</label><input type="text" id="meta-pixel" placeholder="es. 123456789"></div>
      <div class="form-row"><label>EMQ Score (0-10)</label><input type="number" id="meta-emq" min="0" max="10" step="0.1"></div>
    </div>
    <div class="form-grid">
      <div class="form-row"><label>CAPI Setup</label><select id="meta-capi">${c.capi_options.map(o=>`<option>${o}</option>`).join('')}</select></div>
      <div class="form-row"><label>Attribution Window</label><select id="meta-attribution">${c.attribution_window_options.map(o=>`<option>${o}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <label>Status Eventi</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${events.map(e => `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:6px">
            <span style="flex:1;font-size:13px">${e}</span>
            <select class="meta-event-status" data-event="${e}" style="width:auto;padding:4px 8px;font-size:12px">
              ${c.event_status_options.map(o=>`<option>${o}</option>`).join('')}
            </select>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="form-row">
      <label>Deduplication Ratio (%)</label>

// ─── File Handlers ─────────────────────────────────────────────────────────
let gtmParsed = null;

async function handleGtmUpload(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  const fd = new FormData();
  fd.append('file', file);
  const info = document.getElementById('gtm-file-info');
  info.innerHTML = '<div style="color:var(--accent)">Parsing...</div>';
  try {
    const res = await fetch('/api/upload/gtm', {method:'POST', body:fd});
    const data = await res.json();
    if (data.success) {
      gtmParsed = data.parsed;
      info.innerHTML = `<div class="file-item">${file.name} — ${data.summary.tags_count} tag, ${data.summary.triggers_count} trigger, ${data.summary.variables_count} variabili</div>`;
    } else {
      info.innerHTML = `<div style="color:var(--error)">Errore: ${data.error}</div>`;
    }
  } catch(e) {
    info.innerHTML = `<div style="color:var(--error)">Upload fallito</div>`;
  }
}

async function handleGscUpload(input) {
  if (!input.files.length) return;
  const fd = new FormData();
  for (const f of input.files) fd.append('files', f);
  const info = document.getElementById('gsc-file-info');
  info.innerHTML = '<div style="color:var(--accent)">Parsing...</div>';
  try {
    const res = await fetch('/api/upload/gsc', {method:'POST', body:fd});
    const data = await res.json();
    info.innerHTML = data.files.map(f =>
      f.success ? `<div class="file-item">${f.filename} — ${f.rows} righe</div>`
                : `<div style="color:var(--error)">${f.filename}: ${f.error}</div>`
    ).join('');
  } catch(e) {
    info.innerHTML = `<div style="color:var(--error)">Upload fallito</div>`;
  }
}

async function handleEvidence(wizardName, input) {
  if (!input.files.length) return;
  const fd = new FormData();
  fd.append('wizard_name', wizardName);
  for (const f of input.files) fd.append('files', f);
  const info = document.getElementById(`evidence-${wizardName}`);
  try {
    const res = await fetch('/api/upload/evidence', {method:'POST', body:fd});
    const data = await res.json();
    info.innerHTML = `<div class="file-item">${data.count} screenshot caricati</div>`;
  } catch(e) {
    info.innerHTML = `<div style="color:var(--error)">Upload fallito</div>`;
  }
}

// Drag & drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());
document.addEventListener('DOMContentLoaded', () => {
  init();
  document.querySelectorAll('.dropzone').forEach(dz => {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.classList.remove('dragover');
      const input = dz.querySelector('input');
      if (input && e.dataTransfer.files.length) {
        const dt = new DataTransfer();
        for (const file of e.dataTransfer.files) dt.items.add(file);
        input.files = dt.files;
        input.dispatchEvent(new Event('change'));
      }
    });
  });
});

// ─── Wizard Confirm / Skip ─────────────────────────────────────────────────
function confirmWizard(platform) {
  wizardStatus[platform] = 'done';
  updateWizardUI(platform);
  advanceToNextPending();
}

function skipWizard(platform) {
  wizardStatus[platform] = 'skipped';
  updateWizardUI(platform);
  advanceToNextPending();
}

function updateWizardUI(platform) {
  // Update tab style
  const tab = document.querySelector(`.tab[data-platform="${platform}"]`);
  if (tab) {
    tab.classList.remove('done', 'skipped');
    tab.classList.add(wizardStatus[platform]);
  }
  // Show status message in panel
  const msg = document.getElementById(`ws-${platform}`);
  if (msg) {
    msg.style.display = 'block';
    if (wizardStatus[platform] === 'done') {
      msg.style.background = 'rgba(34,197,94,0.15)';
      msg.style.color = 'var(--success)';
      msg.textContent = 'Wizard confermato';
    } else {
      msg.style.background = 'rgba(139,143,163,0.15)';
      msg.style.color = 'var(--text-muted)';
      msg.textContent = 'Wizard saltato';
    }
  }
  updateAuditButton();
}

function advanceToNextPending() {
  const next = activePlatforms.find(p => wizardStatus[p] === 'pending');
  if (next) switchWizardTab(next);
}

function updateAuditButton() {
  const allHandled = activePlatforms.every(p => wizardStatus[p] !== 'pending');
  const btn = document.getElementById('btn-start-audit');
  if (btn) {
    btn.disabled = !allHandled;
    const pending = activePlatforms.filter(p => wizardStatus[p] === 'pending').length;
    if (pending > 0) {
      btn.title = `${pending} wizard ancora da completare o saltare`;
    } else {
      btn.title = '';
    }
  }
}

// ─── Collect Wizard Data ───────────────────────────────────────────────────
function collectWizardData(platforms, btype) {
  const data = {};
  if (platforms.includes('iubenda') && wizardStatus.iubenda === 'done') {
    const cmMap = {'Assente':'none','Basic':'basic','Advanced':'advanced'};
    data.iubenda_data = {
      rejection_rate: parseFloat(document.getElementById('iub-rejection')?.value) || 0,
      consent_mode: cmMap[document.getElementById('iub-consent-mode')?.value] || 'none',
      banner_services: [...document.querySelectorAll('input[name="iub-services"]:checked')].map(c => c.value),
      anomalies_detected: document.getElementById('iub-anomalies')?.value || '',
      operator_notes: document.getElementById('iub-notes')?.value || '',
    };
  }
  if (platforms.includes('gtm') && wizardStatus.gtm === 'done') {
    data.gtm_data = {
      uses_gtm: document.querySelector('input[name="gtm-uses"]:checked')?.value || 'si',
      container_json: gtmParsed || null,
      anomalies_detected: document.getElementById('gtm-anomalies')?.value || '',
      operator_notes: document.getElementById('gtm-notes')?.value || '',
    };
  }
  if (platforms.includes('gads') && wizardStatus.gads === 'done') {
    const convRows = document.querySelectorAll('#gads-conversions-list .conv-row');
    const conversions = [...convRows].map(row => ({
      name: row.querySelector('.conv-name')?.value || '',
      source: row.querySelector('.conv-source')?.value || '',
      counting: row.querySelector('.conv-counting')?.value || '',
      status: row.querySelector('.conv-status')?.value || '',
    }));
    data.gads_data = {
      conversions_active: document.querySelector('input[name="gads-active"]:checked')?.value || 'si',
      consent_mode_diagnostics: document.getElementById('gads-cm-diag')?.value || '',
      enhanced_conversions_diagnostics: document.getElementById('gads-ec-diag')?.value || '',
      attribution_model: document.getElementById('gads-attribution')?.value || '',
      conversion_actions: conversions,
      inactive_days: parseInt(document.getElementById('gads-inactive-days')?.value) || 0,
      ga4_gap_critical: document.getElementById('gads-ga4-gap')?.checked || false,
      anomalies_detected: document.getElementById('gads-anomalies')?.value || '',
      operator_notes: document.getElementById('gads-notes')?.value || '',
    };
  }
  if (platforms.includes('meta') && wizardStatus.meta === 'done') {
    const capiMap = {'Solo Pixel':'pixel_only','Pixel + CAPI':'pixel_capi','Solo CAPI':'capi_only'};
    const attrMap = {'7d click + 1d view':'7d_1d','1d click + 1d view':'1d_1d','7d click':'7d','Altro':'other'};
    const statusMap = {'Funziona':'ok','Errori':'error','Manca':'missing'};
    const events = {};
    document.querySelectorAll('.meta-event-status').forEach(sel => {
      events[sel.dataset.event] = statusMap[sel.value] || sel.value;
    });
    data.meta_data = {
      pixel_id: document.getElementById('meta-pixel')?.value || '',
      emq_score: parseFloat(document.getElementById('meta-emq')?.value) || 0,
      capi_setup: capiMap[document.getElementById('meta-capi')?.value] || 'pixel_only',
      attribution_window: attrMap[document.getElementById('meta-attribution')?.value] || '7d_1d',
      event_status: events,
      deduplication_ratio: parseFloat(document.getElementById('meta-dedup')?.value) || 0,
      anomalies_detected: document.getElementById('meta-anomalies')?.value || '',
      operator_notes: document.getElementById('meta-notes')?.value || '',
    };
  }
  if (platforms.includes('gsc') && wizardStatus.gsc === 'done') {
    const smMap = {'OK':'ok','Errori':'errors','Non inviata':'not_submitted'};
    data.gsc_data = {
      sitemap_status: smMap[document.getElementById('gsc-sitemap')?.value] || 'ok',
      non_indexing_reasons: [...document.querySelectorAll('input[name="gsc-reasons"]:checked')].map(c => c.value),
      total_indexed: parseInt(document.getElementById('gsc-indexed')?.value) || 0,
      total_pages: parseInt(document.getElementById('gsc-total-pages')?.value) || 0,
      anomalies_detected: document.getElementById('gsc-anomalies')?.value || '',
      operator_notes: document.getElementById('gsc-notes')?.value || '',
    };
  }
  return data;
}

// ─── Start Audit ───────────────────────────────────────────────────────────
async function startAudit() {
  const pending = activePlatforms.filter(p => wizardStatus[p] === 'pending');
  if (pending.length > 0) {
    alert(`Completa o salta questi wizard prima di avviare: ${pending.join(', ')}`);
    return;
  }
  const cfg = getConfig();
  // Only include confirmed (non-skipped) platforms in business_profile
  cfg.business_profile.platforms = activePlatforms.filter(p => wizardStatus[p] === 'done');
  wizardData = collectWizardData(cfg.business_profile.platforms, cfg.business_profile.business_type);

  goToScreen(3);
  renderProgressSteps();

  const res = await fetch('/api/audit/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({config: cfg, wizard_data: wizardData}),
  });
  const {session_id} = await res.json();
  sessionId = session_id;
  listenProgress(session_id);
}

const STEP_LABELS = {
  l0: 'L0 Discovery',
  squirrelscan: 'SquirrelScan',
  trust_score: 'Trust Score',
  l2: 'L2 AI Analyses',
  synthesis: 'Opus Synthesis',
  report: 'Report Generation',
  complete: 'Completato',
};

function renderProgressSteps() {
  const el = document.getElementById('progress-list');
  el.innerHTML = Object.entries(STEP_LABELS).map(([key, label]) => `
    <div class="progress-step" id="ps-${key}">
      <div class="step-icon pending" id="psi-${key}">&#9679;</div>
      <div>
        <div class="step-name">${label}</div>
        <div class="step-detail" id="psd-${key}">In attesa...</div>
        ${key === 'l2' ? '<div class="progress-bar"><div class="progress-bar-fill" id="psb-l2" style="width:0%"></div></div><div id="l2-badges" style="margin-top:6px"></div>' : ''}
      </div>
    </div>
  `).join('');
}

function listenProgress(sid) {
  const es = new EventSource(`/api/audit/progress/${sid}`);
  es.addEventListener('progress', e => {
    const d = JSON.parse(e.data);
    const icon = document.getElementById(`psi-${d.step}`);
    const detail = document.getElementById(`psd-${d.step}`);
    if (icon) {
      icon.className = `step-icon ${d.status}`;
      icon.innerHTML = d.status === 'done' ? '&#10003;' : d.status === 'error' ? '&#10007;' : d.status === 'running' ? '&#9881;' : '&#9679;';
    }
    if (detail) detail.textContent = d.detail;
    if (d.step === 'l2') {
      if (d.progress >= 0) {
        const bar = document.getElementById('psb-l2');
        if (bar) bar.style.width = d.progress + '%';
      }
      // Parse completed analysis names from detail
      if (d.detail) {
        const badges = document.getElementById('l2-badges');
        if (badges) {
          const match = d.detail.match(/completat[aeo].*?:\s*(.+)/i) || d.detail.match(/done.*?:\s*(.+)/i);
          if (match) {
            const names = match[1].split(',').map(s => s.trim()).filter(Boolean);
            badges.innerHTML = names.map(n => `<span class="l2-badge">${n}</span>`).join('');
          } else if (d.status === 'done') {
            // Show all when done
            badges.innerHTML = '';
          } else {
            // Try to extract individual analysis name
            const single = d.detail.match(/(\w+)\s+(completat|done|ok)/i);
            if (single) {
              const existing = badges.innerHTML;
              if (!existing.includes(single[1])) {
                badges.innerHTML += `<span class="l2-badge">${single[1]}</span>`;
              }
            }
          }
        }
      }
    }
  });
  es.addEventListener('done', async () => {
    es.close();
    await showResults(sid);
  });
  es.onerror = () => { es.close(); };
}

// ─── Results ───────────────────────────────────────────────────────────────
async function showResults(sid) {
  goToScreen(4);
  let data;
  try {
    const res = await fetch(`/api/audit/result/${sid}`);
    data = await res.json();
  } catch(e) {
    document.getElementById('results-content').innerHTML = `<div class="card error-box">
      <h3>Errore nel recupero dei risultati</h3>
      <p style="color:var(--text-muted);margin-bottom:16px">${e.message || 'Connessione al server fallita'}</p>
      <button class="btn btn-primary" onclick="location.reload()">Ricomincia</button>
    </div>`;
    return;
  }
  const el = document.getElementById('results-content');

  if (data.error) {
    el.innerHTML = `<div class="card error-box">
      <h3>Audit fallito</h3>
      <p style="color:var(--text-muted);margin-bottom:16px">${data.error}</p>
      <button class="btn btn-primary" onclick="goToScreen(1)">Ricomincia</button>
    </div>`;
    return;
  }

  const gradeColors = {A:'#22c55e',B:'#3b82f6',C:'#eab308',D:'#f59e0b',F:'#ef4444'};
  const gc = gradeColors[data.trust_grade] || '#888';

  let html = '';

  // Trust Score hero
  if (data.trust_score != null) {
    html += `<div class="score-hero">
      <div class="score-value" style="color:${gc}">${data.trust_score}</div>
      <div class="score-grade" style="color:${gc}">Grade ${data.trust_grade}</div>
      <div class="score-label">${data.trust_coverage || ''}</div>
    </div>`;
  }

  // Trust Score Pillars
  const pillars = data.trust_pillars;
  if (pillars && typeof pillars === 'object') {
    const pillarList = Array.isArray(pillars) ? pillars : Object.values(pillars);
    if (pillarList.length) {
      html += '<div class="card"><h3>Trust Score — Pilastri</h3>';
      pillarList.forEach(p => {
        const score = p.score ?? p.value ?? 0;
        const label = p.label || p.pillar_id || p.name || '';
        const color = score >= 75 ? 'var(--success)' : score >= 50 ? 'var(--warning)' : 'var(--error)';
        html += `<div class="pillar-bar">
          <div class="pillar-label">${label}</div>
          <div class="pillar-track"><div class="pillar-fill" style="width:${score}%;background:${color}"></div></div>
          <div class="pillar-value" style="color:${color}">${score}</div>
        </div>`;
      });
      html += '</div>';
    }
  }

  // Gap-to-Revenue
  const gap = data.gap_to_revenue;
  if (gap && gap.items && gap.items.length) {
    html += `<div class="card"><h3>Gap-to-Revenue</h3>
      <table class="gap-table"><thead><tr><th>Gap</th><th>Severity</th><th>Impatto su Conversioni</th></tr></thead><tbody>
      ${gap.items.map(i => `<tr><td>${i.label || i.gap || ''}</td><td>${i.severity || ''}</td><td>${i.impact_label || ''}</td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:12px;font-weight:600;color:${gc}">${gap.items.length} problemi identificati</div>
    </div>`;
  }

  // Leverage Nodes
  const nodes = gap && gap.leverage_nodes;
  if (nodes && nodes.length) {
    html += '<div class="card"><h3>Nodi di Leva</h3><div>';
    nodes.forEach(n => {
      const label = typeof n === 'string' ? n : (n.label || n.name || '');
      html += `<span class="leverage-node">${label}</span>`;
    });
    html += '</div></div>';
  }

  // Report download
  if (data.report_filename) {
    html += `<div class="card" style="text-align:center">
      <a href="/api/report/${encodeURIComponent(data.report_filename)}" target="_blank" class="btn btn-primary" style="text-decoration:none">
        Apri Report McKinsey &rarr;
      </a>
    </div>`;
  }

  if (!html) html = '<div class="card">Nessun risultato disponibile.</div>';
  el.innerHTML = html;
}
